<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D1 動態查詢</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans TC', sans-serif; background:#0b0f17; color:#e2e8f0; }
  .input-style { background:#131a28; border:1px solid #263148; border-radius:.7rem; padding:.5rem .75rem; color:#e2e8f0; font-size:.9rem; }
  .input-style:focus { border-color:#3b82f6; outline:none; }
  ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-thumb { background:#263148; border-radius:5px; }
  .chip { font-size:.7rem; padding:.1rem .45rem; border-radius:.5rem; font-weight:700; white-space:nowrap; }
  #toast { position:fixed; left:50%; bottom:2rem; transform:translateX(-50%) translateY(20px); opacity:0; transition:.25s; z-index:90; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── 漢書原始排版區 ─────────────────────────── */
  #raw-view {
    font-family: 'Consolas', '細明體', 'MingLiU', 'Courier New', monospace;
    font-size: 15px; line-height: 1.5;
    background:#000; color:#cfd6e4;
    white-space: pre; overflow-x: auto;
  }
  .hl { padding: 0 .5rem; }
  .hl-sec  { color:#fff; font-weight:700; background:#0e1626; }        /* ■ 分區標題 */
  .hl-tour { cursor:pointer; }
  .hl-tour:hover { background:#122544; }
  .hl-tour.sel { background:#7a5c00; color:#fff; }                     /* 選取行：金黃（仿舊系統）*/
  .hl-tour .code { color:#8ec2ff; background:#0d2c5e; border-radius:.2rem; }
  .hl-tour.sel .code { color:#fff; background:#a37b00; }
  .hl-tour .promo { color:#ff8ab5; }
</style>
</head>
<body>

<!-- ══ 登入頁 ══ -->
<div id="login-page" class="hidden min-h-screen items-center justify-center p-6">
  <div class="w-full max-w-sm bg-[#131a28] border border-[#263148] rounded-3xl p-8 shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3"><i class="fa-solid fa-bolt text-blue-500"></i></div>
      <h1 class="text-2xl font-black tracking-wide">D1 動態查詢</h1>
      <p class="text-xs text-slate-400 mt-2">帳號密碼與 D1 公佈欄相同</p>
    </div>
    <div class="space-y-4">
      <input id="login-acc" class="w-full input-style" placeholder="員編" autocomplete="username">
      <input id="login-pwd" type="password" class="w-full input-style" placeholder="密碼" autocomplete="current-password">
      <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-2xl transition active:scale-95">登入</button>
      <p id="login-msg" class="text-xs text-red-400 font-bold min-h-[1rem] whitespace-pre-wrap"></p>
    </div>
  </div>
</div>

<!-- ══ 主畫面 ══ -->
<div id="main-page" class="hidden h-screen flex flex-col">
  <header class="bg-[#0b0f17] border-b border-[#1a2336] px-4 py-3 shrink-0">
    <div class="flex flex-wrap items-center gap-3">
      <h1 class="text-lg font-black whitespace-nowrap"><i class="fa-solid fa-bolt text-blue-500 mr-1"></i>D1 動態查詢</h1>
      <span id="stamp-badge" class="chip bg-[#152036] text-slate-300"><i class="fa-regular fa-clock mr-1"></i>載入中…</span>
      <div class="flex-1"></div>
      <span id="user-name" class="text-sm text-slate-300"></span>
      <button id="agent-btn" class="text-xs text-slate-400 hover:text-amber-300 border border-[#263148] rounded-lg px-3 py-1.5 transition"><i class="fa-solid fa-id-card mr-1"></i>業務設定</button>
      <a href="./" class="text-xs text-slate-400 hover:text-blue-400 border border-[#263148] rounded-lg px-3 py-1.5 transition"><i class="fa-solid fa-house mr-1"></i>回公佈欄</a>
      <button id="logout-btn" class="text-xs text-slate-400 hover:text-red-400 border border-[#263148] rounded-lg px-3 py-1.5 transition">登出</button>
    </div>
    <div class="flex flex-wrap items-center gap-2 mt-3 text-sm">
      <span class="text-slate-500 font-bold">動態：</span>
      <select id="f-line" class="input-style font-bold min-w-[220px]"></select>
      <span class="text-slate-500 font-bold ml-2">地區：</span>
      <select id="f-region" class="input-style min-w-[140px]"><option value="">全部地區</option></select>
      <span class="text-slate-500 font-bold ml-2">日期：</span>
      <input id="f-from" type="date" class="input-style">
      <span class="text-slate-600">→</span>
      <input id="f-to" type="date" class="input-style">
      <input id="f-search" class="input-style w-44 ml-2" placeholder="🔍 搜尋（團號/任意字）">
    </div>
  </header>

  <main id="raw-view" class="flex-1 py-2"></main>
</div>

<!-- ══ 明細卡（選取資料）══ -->
<div id="detail-card" class="hidden fixed right-4 bottom-4 w-[390px] max-w-[calc(100vw-2rem)] bg-[#131a28] border border-[#263148] rounded-2xl shadow-2xl z-50 overflow-hidden">
  <div class="flex items-center justify-between px-4 py-3 border-b border-[#1a2336] relative">
    <span class="font-bold text-sm">選取資料</span>
    <div class="flex items-center gap-2">
      <button id="dcol-btn" class="text-xs text-slate-400 hover:text-white border border-[#263148] rounded-lg px-2.5 py-1.5 transition"><i class="fa-solid fa-gear mr-1"></i>顯示欄位</button>
      <button id="detail-close" class="text-slate-400 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="dcol-menu" class="hidden absolute right-3 top-12 bg-[#131a28] border border-[#263148] rounded-xl p-3 shadow-2xl z-[70] w-40"></div>
  </div>
  <div id="detail-body" class="p-4 text-sm max-h-[50vh] overflow-y-auto"></div>
  <div id="chosen-file" class="hidden mx-3 mb-1 px-3 py-2 bg-[#0e1a2e] border border-[#263148] rounded-xl text-xs flex items-center gap-2">
    <i class="fa-regular fa-file-pdf text-red-400"></i>
    <span id="chosen-file-name" class="flex-1 truncate text-slate-300"></span>
    <button id="chosen-file-clear" class="text-slate-500 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="grid grid-cols-2 gap-2 p-3 border-t border-[#1a2336]">
    <button id="files-btn" class="bg-blue-700 hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl text-sm transition"><i class="fa-regular fa-folder-open mr-1"></i>選取行程檔案</button>
    <button id="copy-btn" class="bg-[#1d2940] hover:bg-[#26365a] text-slate-200 font-bold py-2.5 rounded-xl text-sm transition"><i class="fa-regular fa-copy mr-1"></i>複製摘要</button>
    <button class="bg-emerald-900/40 text-emerald-600 font-bold py-2.5 rounded-xl text-sm cursor-not-allowed" title="下一階段接上合約系統"><i class="fa-solid fa-file-signature mr-1"></i>建立合約</button>
    <button id="convert-btn" class="bg-indigo-700 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-xl text-sm transition"><i class="fa-solid fa-plane mr-1"></i>轉換連結</button>
  </div>
</div>

<!-- ══ 業務設定 modal ══ -->
<div id="agent-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="bg-[#131a28] border border-[#263148] rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-[#1a2336]">
      <span class="font-bold"><i class="fa-solid fa-id-card text-amber-300 mr-2"></i>業務設定（轉換連結名片）</span>
      <button id="agent-close" class="text-slate-400 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="p-5 space-y-3 text-sm max-h-[65vh] overflow-y-auto">
      <div><label class="text-xs text-slate-500 font-bold">業務姓名 *</label><input id="ag-name" class="w-full input-style mt-1" placeholder="旅遊大仁哥"></div>
      <div><label class="text-xs text-slate-500 font-bold">聯絡電話</label><input id="ag-phone" class="w-full input-style mt-1" placeholder="0277463632"></div>
      <div><label class="text-xs text-slate-500 font-bold">LINE ID</label><input id="ag-line" class="w-full input-style mt-1" placeholder="不含 @ 符號"></div>
      <div><label class="text-xs text-slate-500 font-bold">FB 粉專／社團連結</label><input id="ag-fb" class="w-full input-style mt-1" placeholder="https://www.facebook.com/…（選填）"></div>
      <div><label class="text-xs text-slate-500 font-bold">LINE 社群連結</label><input id="ag-lg" class="w-full input-style mt-1" placeholder="https://line.me/ti/g2/…（選填）"></div>
      <div><label class="text-xs text-slate-500 font-bold">授權信箱 *</label><input id="ag-email" class="w-full input-style mt-1" placeholder="跟原本外掛用的同一個信箱">
        <p class="text-[.65rem] text-slate-600 mt-1">縮網址授權用。填你在「行程連結轉換器」外掛裡用的那個信箱。</p></div>
      <button id="agent-save" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-2.5 rounded-xl transition">儲存</button>
    </div>
  </div>
</div>

<!-- ══ 轉換連結 modal ══ -->
<div id="convert-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="bg-[#131a28] border border-[#263148] rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-[#1a2336]">
      <span class="font-bold"><i class="fa-solid fa-plane text-indigo-400 mr-2"></i>轉換連結</span>
      <button id="convert-close" class="text-slate-400 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="p-5 space-y-3 text-sm">
      <div class="flex justify-between"><span class="text-slate-500">團號</span><span id="cv-code" class="font-mono font-bold text-blue-300"></span></div>
      <div>
        <label class="text-xs text-slate-500 font-bold">行程檔案</label>
        <div id="cv-file-row" class="mt-1"></div>
        <input id="cv-file-paste" class="w-full input-style mt-1.5" placeholder="或直接貼上行程 PDF 的雲端連結（drive.google.com/file/d/…）">
      </div>
      <label class="flex items-center gap-2 cursor-pointer select-none text-slate-300">
        <input id="cv-remain" type="checkbox" class="accent-indigo-500" checked>顯示剩餘名額（客人頁面）
      </label>
      <button id="cv-go" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl transition"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>產生連結</button>
      <div id="cv-result" class="hidden bg-[#0e1a2e] border border-indigo-900 rounded-xl p-3">
        <div class="flex items-center gap-2">
          <input id="cv-short" readonly class="flex-1 input-style font-mono text-indigo-300">
          <button id="cv-copy" class="bg-indigo-700 hover:bg-indigo-600 text-white rounded-lg px-3 py-2"><i class="fa-regular fa-copy"></i></button>
        </div>
        <a id="cv-preview" target="_blank" rel="noopener" class="inline-block text-xs text-slate-400 hover:text-indigo-300 mt-2"><i class="fa-solid fa-eye mr-1"></i>預覽客人看到的頁面</a>
      </div>
      <p id="cv-msg" class="text-xs text-red-400 min-h-[1rem]"></p>
    </div>
  </div>
</div>

<!-- ══ 行程檔案選擇 modal ══ -->
<div id="files-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="bg-[#131a28] border border-[#263148] rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-[#1a2336]">
      <span class="font-bold">請選擇行程檔案</span>
      <button id="files-close" class="text-slate-400 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="px-5 py-3 border-b border-[#1a2336] flex gap-2">
      <input id="files-search" class="input-style flex-1" placeholder="請輸入關鍵字搜尋…">
      <button id="files-expand" class="input-style text-xs">全部展開</button>
      <button id="files-collapse" class="input-style text-xs">全部收合</button>
    </div>
    <div id="files-tree" class="flex-1 overflow-y-auto p-4 text-sm"></div>
  </div>
</div>

<div id="toast" class="bg-blue-600 text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-xl"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeUModpZrGLQifjDXhIOfIAYdK538wgik",
  authDomain: "ddd1-v3.firebaseapp.com",
  projectId: "ddd1-v3",
  storageBucket: "ddd1-v3.appspot.com",
  messagingSenderId: "932033353369",
  appId: "1:932033353369:web:4a9d11493257fa6e924a08",
};
const LEGACY_DOMAIN = "@d-group.app";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── 全域狀態 ──
let META = null;
let RAWCACHE = {};            // 檔號 → { name, lines:[...] }
let ROWCACHE = {};            // 檔號 → rows
let LINES = [];               // 目前檔案的行（含 row 對應）
let SELECTED = null;          // 選到的 row
let SELLINE = -1;             // 選到的行 index
let FILETREE = null;          // 行程檔案樹
let UID = null;               // 登入者 uid
let AGENT = {};               // 業務設定（dt_agent/{uid}）
let CHOSENFILE = null;        // 選取的行程檔案 { id, n }
const ITIN_BASE = 'https://discoveredtrip.com';   // 中轉頁

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$ = n => n == null ? '--' : n.toLocaleString();
const WD = ['日','一','二','三','四','五','六'];
const fmtDt = iso => {
  if (!iso) return '--';
  const [y, m, d] = iso.split('-').map(Number);
  return `${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}(${WD[new Date(y, m-1, d).getDay()]})`;
};
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
function showPage(id) { ['login-page','main-page'].forEach(p => { $(p).classList.toggle('hidden', p !== id); if (p === id) $(p).classList.add('flex'); else $(p).classList.remove('flex'); }); }

// ── 登入（與公佈欄同一套帳號）──
$('login-btn').onclick = doLogin;
$('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function doLogin() {
  let e = $('login-acc').value.trim(), p = $('login-pwd').value;
  if (!e || !p) return $('login-msg').innerText = '請輸入員編和密碼';
  if (!e.includes('@')) e += LEGACY_DOMAIN;
  $('login-msg').innerText = '';
  signInWithEmailAndPassword(auth, e, p).catch(err => {
    $('login-msg').innerText = /invalid-credential|wrong-password|user-not-found/.test(err.code)
      ? '員編或密碼錯誤' : '登入失敗：' + err.code;
  });
}
$('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) return showPage('login-page');
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { $('login-msg').innerText = '權限錯誤：找不到使用者紀錄'; return signOut(auth); }
    UID = user.uid;
    $('user-name').textContent = snap.data().nickname || snap.data().account || '';
    showPage('main-page');
    // 業務設定（轉換連結名片）
    try { const ag = await getDoc(doc(db, 'dt_agent', UID)); AGENT = ag.exists() ? ag.data() : {}; } catch { AGENT = {}; }
    await boot();
  } catch (err) {
    $('login-msg').innerText = '讀取失敗：' + err.message; signOut(auth);
  }
});

// ── 啟動 ──
async function boot() {
  const m = await getDoc(doc(db, 'dt_tours', '_meta'));
  if (!m.exists()) { $('stamp-badge').innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i>還沒有資料'; return; }
  META = m.data();

  const ageMin = (Date.now() - new Date(META.stamp.replace(' ', 'T'))) / 60000;
  const stale = ageMin > 150;
  $('stamp-badge').className = 'chip ' + (stale ? 'bg-red-900/60 text-red-300' : 'bg-[#152036] text-slate-300');
  $('stamp-badge').innerHTML = `<i class="fa-regular fa-clock mr-1"></i>資料時間 ${esc(META.stamp.slice(5))}（每小時更新${stale ? '｜⚠ 已超過 ' + Math.round(ageMin/60) + ' 小時' : ''}）`;

  // 動態選單：顯示漢書原始檔名（跟舊系統一樣）
  const files = [...META.files].sort((a, b) => a.f.localeCompare(b.f));
  $('f-line').innerHTML = files.map(f =>
    `<option value="${esc(f.f)}">${esc((f.name || f.line).replace(/\.txt$/i, '').replace(/\s+/g, ' '))}</option>`).join('');
  const saved = localStorage.getItem('d1dt_line');
  if (saved && files.some(f => f.f === saved)) $('f-line').value = saved;

  const t = new Date(), p2 = n => String(n).padStart(2, '0');
  $('f-from').value = `${t.getFullYear()}-${p2(t.getMonth()+1)}-${p2(t.getDate())}`;
  const e = new Date(t); e.setFullYear(e.getFullYear() + 1);
  $('f-to').value = `${e.getFullYear()}-${p2(e.getMonth()+1)}-${p2(e.getDate())}`;

  await loadFile();
}

// ── 載入一個漢書檔（原文＋解析資料）──
async function loadFile() {
  const fno = $('f-line').value;
  localStorage.setItem('d1dt_line', fno);
  $('raw-view').innerHTML = '<div class="text-slate-500 p-6"><i class="fa-solid fa-spinner fa-spin mr-2"></i>載入中…</div>';

  if (!RAWCACHE[fno]) {
    const [rawSnap, rowSnap] = await Promise.all([
      getDoc(doc(db, 'dt_raw', fno)),
      getDoc(doc(db, 'dt_tours', fno)),
    ]);
    RAWCACHE[fno] = rawSnap.exists() ? rawSnap.data() : { text: '' };
    ROWCACHE[fno] = rowSnap.exists() ? JSON.parse(rowSnap.data().rows) : [];
  }

  // 行 → 團 的對應（用原始行文字比對；漢書同團重複列出的行會對到同一團，正常）
  const rowByRaw = new Map();
  for (const r of ROWCACHE[fno]) if (r.rw) rowByRaw.set(r.rw, r);

  const secRe = /^[\s"]*■/;
  const headerRe = /備註/;
  LINES = RAWCACHE[fno].text.split('\n').map((t0, i) => {
    const text = t0.replace(/\r$/, '').trimEnd();
    const row = rowByRaw.get(text) || null;
    const isSec = secRe.test(text) && !headerRe.test(text) && !/★/.test(text);
    return { i, text, row, isSec };
  });

  // 地區選單：分區標題行
  const secs = LINES.filter(l => l.isSec && l.text.replace(/[■▆▂▄*＊\s　"]/g, ''));
  $('f-region').innerHTML = '<option value="">全部地區</option>' + secs.map(l =>
    `<option value="${l.i}">${esc(l.text.replace(/[■▆▂▄*＊\s　"]/g, ''))}</option>`).join('');

  SELECTED = null; SELLINE = -1;
  $('detail-card').classList.add('hidden');
  render();
}

// ── 呈現（保留漢書原樣，只做過濾和上色）──
function render() {
  const from = $('f-from').value, to = $('f-to').value;
  const q = $('f-search').value.trim().toUpperCase();
  const regionStart = $('f-region').value === '' ? -1 : +$('f-region').value;

  // 地區範圍：選定分區 → 只顯示該分區到下一個分區之間
  let regionEnd = Infinity;
  if (regionStart >= 0) {
    const next = LINES.find(l => l.isSec && l.i > regionStart);
    regionEnd = next ? next.i : Infinity;
  }

  const out = [];
  for (const l of LINES) {
    if (regionStart >= 0 && (l.i < regionStart || l.i >= regionEnd)) continue;
    if (l.row) {
      if (from && l.row.dt && l.row.dt < from) continue;
      if (to && l.row.dt && l.row.dt > to) continue;
      if (q && !l.text.toUpperCase().includes(q)) continue;
      let h = esc(l.text);
      // 團號上色（跟舊系統一樣把團號標成藍色塊）
      // 只標團號裡的日期四碼（跟舊系統一樣），不是整串團號
      h = h.replace(/([A-Z]{2,3}\d[A-Z0-9]{2}|[=＝]{4,})(\d{4})(?=[A-Z]\d)/, (m, pre, dt) => `${pre}<span class="code">${dt}</span>`);
      h = h.replace(/(&quot;促銷&quot;)/g, '<span class="promo">$1</span>');
      out.push(`<div class="hl hl-tour ${SELLINE === l.i ? 'sel' : ''}" data-i="${l.i}">${h}</div>`);
    } else if (l.isSec) {
      if (q) continue;
      out.push(`<div class="hl hl-sec">${esc(l.text)}</div>`);
    } else {
      if (q) continue;
      out.push(`<div class="hl text-slate-400">${esc(l.text) || ' '}</div>`);
    }
  }
  $('raw-view').innerHTML = out.join('') || '<div class="text-slate-500 p-6">沒有符合條件的資料</div>';
  $('raw-view').querySelectorAll('.hl-tour').forEach(el => el.onclick = () => selectLine(+el.dataset.i));
}

// ── 選取一行（＝一團）──
function selectLine(i) {
  const l = LINES[i];
  if (!l || !l.row) return;
  SELLINE = i; SELECTED = l.row;
  render();
  showDetail(l.row);
}

// ── 明細卡欄位設定（照舊系統：預設只顯示團費/航空/出發日/天數，其他用「顯示欄位」勾）──
const DFIELDS = [
  { k: 'an',  name: '航空公司', def: 1 },
  { k: 'dt',  name: '出發日',   def: 1 },
  { k: 'dy',  name: '天數',     def: 1 },
  { k: 'p',   name: '產品',     def: 0 },
  { k: 'cap', name: '機位',     def: 0 },
  { k: 's',   name: '報名',     def: 0 },
  { k: 'r',   name: '剩餘名額', def: 0 },
  { k: 'ld',  name: '領隊',     def: 0 },
  { k: 'dl',  name: 'ＤＬ',     def: 0 },
  { k: 'tp',  name: '票款',     def: 0 },
  { k: 'ti',  name: '開票',     def: 0 },
  { k: 'tk',  name: '票+稅',    def: 0 },
  { k: 'bs',  name: '報名明細', def: 0 },
];
let dshow = JSON.parse(localStorage.getItem('d1dt_dfields') || 'null')
  || Object.fromEntries(DFIELDS.map(f => [f.k, !!f.def]));

function buildDMenu() {
  $('dcol-menu').innerHTML = DFIELDS.map(f =>
    `<label class="flex items-center gap-2 py-1 text-sm cursor-pointer select-none">
      <input type="checkbox" class="accent-blue-500" data-k="${f.k}" ${dshow[f.k] ? 'checked' : ''}>${f.name}
    </label>`).join('');
  $('dcol-menu').querySelectorAll('input').forEach(cb => cb.onchange = () => {
    dshow[cb.dataset.k] = cb.checked;
    localStorage.setItem('d1dt_dfields', JSON.stringify(dshow));
    if (SELECTED) showDetail(SELECTED);
  });
}
$('dcol-btn').onclick = e => { e.stopPropagation(); buildDMenu(); $('dcol-menu').classList.toggle('hidden'); };
document.addEventListener('click', e => { if (!$('dcol-menu').contains(e.target) && e.target !== $('dcol-btn')) $('dcol-menu').classList.add('hidden'); });

function showDetail(r) {
  const line = (k, v) => `<div class="flex justify-between py-1.5 border-b border-[#1a2336]"><span class="text-slate-500">${k}</span><span class="font-bold text-right">${v}</span></div>`;
  const parts = [
    `<div class="font-mono text-blue-300 font-bold text-base mb-2">${esc(r.c)}${r.pm ? ' <span class="chip bg-pink-900/60 text-pink-300">促銷</span>' : ''}</div>`,
    line('團費', `<span class="text-amber-300 text-lg">${fmt$(r.pr)}</span>`),
  ];
  if (dshow.an) parts.push(line('航空公司', esc(r.an)));
  if (dshow.dt) parts.push(line('出發日', fmtDt(r.dt)));
  if (dshow.dy) parts.push(line('天數', `${r.dy}天`));
  if (dshow.p)  parts.push(line('產品', `${esc(r.p)}${r.gw !== '直飛' ? '｜' + esc(r.gw) : ''}${r.dp !== '台北' ? '｜' + esc(r.dp) + '出發' : ''}`));
  if (dshow.cap) parts.push(line('機位', `${r.cap ?? '--'}${r.ok ? '' : ' ⚠'}`));
  if (dshow.s)  parts.push(line('報名', `${r.s} 人${r.w ? '（候補 ' + r.w + '）' : ''}`));
  if (dshow.r)  parts.push(line('剩餘名額', `<span class="${r.r === 0 ? 'text-red-400' : r.r <= 5 ? 'text-amber-300' : 'text-emerald-400'}">${r.r === 0 ? '滿' : r.r + ' 位'}</span>`));
  if (dshow.ld) parts.push(line('領隊', r.ld ? esc(r.ld) : '未派'));
  if (dshow.dl && r.dl) parts.push(line('ＤＬ', esc(r.dl)));
  if (dshow.tp && r.tp) parts.push(line('票款', esc(r.tp)));
  if (dshow.ti && r.ti) parts.push(line('開票', esc(r.ti)));
  if (dshow.tk && r.tf != null) parts.push(line('票+稅', `${fmt$(r.tf)} + ${fmt$(r.tx)}`));
  if (dshow.bs) {
    const bs = (r.bs || []).map(([n, x, paid]) => `<span class="chip ${paid ? 'bg-emerald-900/50 text-emerald-300' : 'bg-slate-800 text-slate-400'}" title="${paid ? '已收訂' : '卡位未收款'}">${esc(n)}${x}</span>`).join(' ');
    if (bs) parts.push(`<div class="pt-2"><span class="text-slate-500 text-xs">報名明細</span><div class="mt-1.5 flex flex-wrap gap-1.5">${bs}</div></div>`);
  }
  parts.push(`<p class="text-[.65rem] text-slate-600 mt-3">資料時間 ${esc(META?.stamp || '')}，下訂前請回漢書確認</p>`);
  $('detail-body').innerHTML = parts.join('');
  $('detail-card').classList.remove('hidden');
}
$('detail-close').onclick = () => { $('detail-card').classList.add('hidden'); SELECTED = null; SELLINE = -1; $('dcol-menu').classList.add('hidden'); render(); };

$('copy-btn').onclick = () => {
  const r = SELECTED; if (!r) return;
  const txt = `【${r.ln}】${r.p} ${r.dy}天｜${r.c}｜${fmtDt(r.dt)} 出發｜${r.an}｜團費 ${fmt$(r.pr)}` +
    (dshow.r ? `｜餘 ${r.r} 位` : '') + (r.pm ? '｜促銷中' : '') +
    `（資料時間 ${META?.stamp || ''}）`;
  navigator.clipboard.writeText(txt).then(() => toast('已複製摘要'));
};

// ── 行程檔案樹（dt_files 由同步程式維護；還沒開通就顯示說明）──
$('files-btn').onclick = async () => {
  $('files-modal').classList.remove('hidden');
  if (!FILETREE) {
    $('files-tree').innerHTML = '<div class="text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>載入中…</div>';
    const snap = await getDoc(doc(db, 'dt_files', 'tree'));
    if (!snap.exists()) {
      $('files-tree').innerHTML = '<div class="text-slate-500 text-center py-8">行程檔案清單尚未開通<br><span class="text-xs">（需要公司雲授權，請通知 IT）</span></div>';
      return;
    }
    FILETREE = JSON.parse(snap.data().tree);
  }
  renderTree();
};
$('files-close').onclick = () => $('files-modal').classList.add('hidden');
$('files-modal').onclick = e => { if (e.target === $('files-modal')) $('files-modal').classList.add('hidden'); };

let expandAll = false;
$('files-expand').onclick = () => { expandAll = true; renderTree(); };
$('files-collapse').onclick = () => { expandAll = false; renderTree(); };
$('files-search').oninput = () => renderTree();

function renderTree() {
  if (!FILETREE) return;
  const q = $('files-search').value.trim().toLowerCase();
  const fmtTime = ms => {
    if (!ms) return '';
    const d = new Date(ms);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const node = (n, depth) => {
    if (n.files !== undefined) {  // 資料夾
      const kids = (n.children || []).map(c => node(c, depth + 1)).join('') +
        (n.files || []).filter(f => !q || f.n.toLowerCase().includes(q)).map(f =>
          `<div class="flex justify-between items-center py-1 pr-2 hover:bg-[#1a2336] rounded" style="padding-left:${depth * 1.25 + 1}rem">
            <button class="file-pick text-blue-400 hover:underline truncate text-left" data-id="${esc(f.id)}" data-n="${esc(f.n)}">${esc(f.n)}</button>
            <span class="shrink-0 ml-3 flex items-center gap-2">
              <span class="text-slate-600 text-xs">${fmtTime(f.t)}</span>
              <a href="https://drive.google.com/file/d/${esc(f.id)}/view" target="_blank" rel="noopener" title="預覽" class="text-slate-500 hover:text-blue-400"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>
            </span>
          </div>`).join('');
      if (q && !kids) return '';
      const open = expandAll || q || depth === 0;
      return `<details ${open ? 'open' : ''} style="padding-left:${depth ? 1.25 : 0}rem">
        <summary class="cursor-pointer py-1 font-bold text-slate-300 hover:text-white select-none">${esc(n.name)}</summary>${kids}</details>`;
    }
    return '';
  };
  $('files-tree').innerHTML = (FILETREE.children || []).map(c => node(c, 0)).join('') || '<div class="text-slate-500">沒有符合的檔案</div>';
  // 點檔名＝選取這個行程檔（顯示在明細卡上，轉換連結會用它）
  $('files-tree').querySelectorAll('.file-pick').forEach(btn => btn.onclick = () => {
    CHOSENFILE = { id: btn.dataset.id, n: btn.dataset.n };
    updateChosenFile();
    $('files-modal').classList.add('hidden');
    toast('已選取：' + btn.dataset.n);
    if (!$('convert-modal').classList.contains('hidden')) fillConvert();
  });
}

function updateChosenFile() {
  $('chosen-file').classList.toggle('hidden', !CHOSENFILE);
  if (CHOSENFILE) $('chosen-file-name').textContent = CHOSENFILE.n;
}
$('chosen-file-clear').onclick = () => { CHOSENFILE = null; updateChosenFile(); };

// ── 業務設定 ──
const AG_FIELDS = { name: 'ag-name', phone: 'ag-phone', line: 'ag-line', fb: 'ag-fb', lg: 'ag-lg', email: 'ag-email' };
$('agent-btn').onclick = () => {
  for (const [k, id] of Object.entries(AG_FIELDS)) $(id).value = AGENT[k] || '';
  $('agent-modal').classList.remove('hidden');
};
$('agent-close').onclick = () => $('agent-modal').classList.add('hidden');
$('agent-modal').onclick = e => { if (e.target === $('agent-modal')) $('agent-modal').classList.add('hidden'); };
$('agent-save').onclick = async () => {
  const data = {};
  for (const [k, id] of Object.entries(AG_FIELDS)) data[k] = $(id).value.trim();
  data.line = data.line.replace(/^@/, '');   // LINE ID 不含 @
  if (!data.name) return toast('請填業務姓名');
  try {
    await setDoc(doc(db, 'dt_agent', UID), data, { merge: true });
    AGENT = { ...AGENT, ...data };
    $('agent-modal').classList.add('hidden');
    toast('業務設定已儲存');
  } catch (e) { toast('儲存失敗：' + e.message); }
};

// ── 轉換連結 ──
$('convert-btn').onclick = () => {
  if (!SELECTED) return;
  if (!AGENT.name || !AGENT.email) {
    toast('請先完成業務設定（姓名＋授權信箱）');
    $('agent-btn').onclick();
    return;
  }
  fillConvert();
  $('cv-result').classList.add('hidden');
  $('cv-msg').textContent = '';
  $('convert-modal').classList.remove('hidden');
};
function fillConvert() {
  $('cv-code').textContent = SELECTED ? SELECTED.c : '';
  $('cv-file-row').innerHTML = CHOSENFILE
    ? `<div class="flex items-center gap-2 bg-[#0e1a2e] border border-[#263148] rounded-xl px-3 py-2"><i class="fa-regular fa-file-pdf text-red-400"></i><span class="flex-1 truncate">${esc(CHOSENFILE.n)}</span></div>`
    : `<button id="cv-pick" class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-2 rounded-xl transition"><i class="fa-regular fa-folder-open mr-1"></i>從公司雲選取</button>`;
  const pick = $('cv-pick');
  if (pick) pick.onclick = () => $('files-btn').onclick();
}
$('convert-close').onclick = () => $('convert-modal').classList.add('hidden');
$('convert-modal').onclick = e => { if (e.target === $('convert-modal')) $('convert-modal').classList.add('hidden'); };

$('cv-go').onclick = async () => {
  const r = SELECTED;
  if (!r) return;
  $('cv-msg').textContent = '';
  // 行程檔：優先用選取的，否則從貼上的雲端連結抓 id
  let fileId = CHOSENFILE?.id || null;
  if (!fileId) {
    const m = $('cv-file-paste').value.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) fileId = m[1];
  }
  if (!fileId) { $('cv-msg').textContent = '請選取行程檔案，或貼上雲端 PDF 連結'; return; }

  let longUrl = `${ITIN_BASE}/?id=${fileId}&n=${encodeURIComponent(AGENT.name)}`;
  if (AGENT.phone) longUrl += `&p=${encodeURIComponent(AGENT.phone)}`;
  if (AGENT.line)  longUrl += `&l=${encodeURIComponent(AGENT.line)}`;
  if (AGENT.fb)    longUrl += `&fb=${encodeURIComponent(AGENT.fb)}`;
  if (AGENT.lg)    longUrl += `&lg=${encodeURIComponent(AGENT.lg)}`;
  longUrl += `&codes=${encodeURIComponent(r.c)}`;
  if (!$('cv-remain').checked) longUrl += `&remain=0`;

  $('cv-go').disabled = true;
  $('cv-go').innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>產生中…';
  try {
    const res = await fetch(`${ITIN_BASE}/api/shorten`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: longUrl, email: AGENT.email }),
    });
    if (!res.ok) throw new Error(res.status === 403 ? '此信箱未授權，請確認業務設定裡的授權信箱' : '產生失敗（' + res.status + '）');
    const data = await res.json();
    if (!data.shortUrl) throw new Error('產生失敗');
    $('cv-short').value = data.shortUrl;
    $('cv-preview').href = data.shortUrl;
    $('cv-result').classList.remove('hidden');
    navigator.clipboard?.writeText(data.shortUrl).then(() => toast('連結已產生並複製'));
  } catch (e) {
    $('cv-msg').textContent = e.message;
  } finally {
    $('cv-go').disabled = false;
    $('cv-go').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-1"></i>產生連結';
  }
};
$('cv-copy').onclick = () => { navigator.clipboard.writeText($('cv-short').value).then(() => toast('已複製')); };

// ── 篩選事件 ──
$('f-line').onchange = loadFile;
['f-region','f-from','f-to'].forEach(id => $(id).onchange = render);
$('f-search').oninput = render;
</script>
</body>
