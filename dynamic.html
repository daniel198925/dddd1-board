<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sarasa-mono-web@0.1.0/fonts/SarasaMonoCL-Regular/SarasaMonoCL-Regular.css">
<!-- 日期範圍選取（公佈欄也是用這套）；zh 語系讓月份/星期顯示中文 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
<style>
  /* ── 深／淺色主題（顏色都走變數，切換只換這一組值）────────── */
  :root {
    --bg:#0b0f17; --surface:#131a28; --surface2:#0e1a2e;
    --bd:#263148; --bd2:#1a2336;
    --fg:#e2e8f0; --m1:#cbd5e1; --m2:#94a3b8; --m3:#64748b; --m4:#475569;
    --raw-bg:#000; --raw-fg:#cfd6e4;
    --sec-bg:#0e1626; --sec-fg:#fff;
    --hover:#122544; --sel-bg:#7a5c00; --sel-fg:#fff;
    --code-fg:#8ec2ff; --code-bg:#0d2c5e; --sel-code-bg:#a37b00;
    --promo:#ff8ab5; --price:#fcd34d;
  }
  [data-theme="light"] {
    --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc;
    --bd:#cbd5e1; --bd2:#e2e8f0;
    --fg:#0f172a; --m1:#334155; --m2:#475569; --m3:#64748b; --m4:#94a3b8;
    --raw-bg:#fff; --raw-fg:#1e293b;
    --sec-bg:#e2e8f0; --sec-fg:#0f172a;
    --hover:#dbeafe; --sel-bg:#fde68a; --sel-fg:#111;
    --code-fg:#1d4ed8; --code-bg:#dbeafe; --sel-code-bg:#f59e0b;
    --promo:#db2777; --price:#b45309;
  }
  body { font-family:'Noto Sans TC', sans-serif; background:var(--bg); color:var(--fg); }

  /* 主題感知的工具 class（取代寫死的色碼） */
  .surface { background:var(--surface); } .surface2 { background:var(--surface2); }
  .app-bg  { background:var(--bg); }
  .bd { border-color:var(--bd); } .bd2 { border-color:var(--bd2); }
  .m1 { color:var(--m1); } .m2 { color:var(--m2); } .m3 { color:var(--m3); } .m4 { color:var(--m4); }
  .price { color:var(--price); }

  .input-style { background:var(--surface); border:1px solid var(--bd); border-radius:.7rem; padding:.5rem .75rem; color:var(--fg); font-size:.9rem; }
  .input-style:focus { border-color:#3b82f6; outline:none; }
  ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-thumb { background:var(--bd); border-radius:5px; }
  .chip { font-size:.7rem; padding:.1rem .45rem; border-radius:.5rem; font-weight:700; white-space:nowrap; }
  #toast { position:fixed; left:50%; bottom:2rem; transform:translateX(-50%) translateY(20px); opacity:0; transition:.25s; z-index:90; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── 漢書原始排版區 ─────────────────────────── */
  #raw-view {
    font-family: 'SarasaMonoCL-Regular', 'MingLiU', '細明體', 'Consolas', monospace;
    font-size: var(--raw-size, 15px); line-height: 1.5;
    background:var(--raw-bg); color:var(--raw-fg);
    white-space: pre; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .hl { padding: 0 .5rem; }
  .hl-sec  { color:var(--sec-fg); font-weight:700; background:var(--sec-bg); }
  .hl-tour { cursor:pointer; }
  .hl-tour:hover { background:var(--hover); }
  .hl-tour.sel { background:var(--sel-bg); color:var(--sel-fg); }       /* 選取行：金黃（仿舊系統）*/
  .hl-tour .code { color:var(--code-fg); background:var(--code-bg); border-radius:.2rem; }
  .hl-tour.sel .code { color:var(--sel-fg); background:var(--sel-code-bg); }
  .hl-tour .promo { color:var(--promo); }

  /* ── 手機（≤640px）：卡片縮小、一樣可以拖、按鈕只留圖示 ── */
  @media (max-width: 640px) {
    :root { --raw-size: 12px; }
    #detail-card { width: 178px; max-height: 54vh; }
    #detail-body { padding: .25rem .4rem; }
    #detail-body .dline { padding-top: .2rem; padding-bottom: .2rem; }
    .btn-txt { display: none; }             /* 按鈕只留圖示，省一大塊空間 */
    #detail-actions { grid-template-columns: repeat(4, 1fr); }
    .hl { padding:.15rem .5rem; }           /* 行距拉開，手指好點 */
    .mobile-hide { display:none !important; }
  }
  /* 手指拖曳時不要讓瀏覽器把它當成捲動 */
  #detail-head { touch-action: none; }

  /* 快速篩選按鈕：關閉＝一般外框，開啟＝亮起來 */
  .filter-btn { cursor: pointer; font-weight: 700; }
  .filter-btn.on { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
  [data-theme="light"] .filter-btn.on { background: #2563eb; border-color: #2563eb; color: #fff; }

  /* 選取行程・系統判斷最相符（星號）那行：琥珀底＋左邊琥珀線，明顯 */
  .file-hl { background: rgba(245,158,11,.22); box-shadow: inset 4px 0 0 #f59e0b; border-radius: 6px; }
  .file-hl .file-pick { color: #fde68a !important; }            /* 深色模式：淺黃字 */
  /* 日曆配合深／淺色主題（flatpickr 預設是淺色的，深色模式要整組換掉）*/
  .flatpickr-calendar { background:var(--surface); box-shadow:0 8px 30px rgba(0,0,0,.45); border:1px solid var(--bd); }
  .flatpickr-calendar.arrowTop:before, .flatpickr-calendar.arrowTop:after { border-bottom-color:var(--surface); }
  .flatpickr-months, .flatpickr-month, .flatpickr-current-month, .flatpickr-monthDropdown-months { background:var(--surface); color:var(--fg); fill:var(--fg); }
  .flatpickr-weekdays, span.flatpickr-weekday { background:var(--surface); color:var(--m2); }   /* 要 span 才蓋得過 flatpickr 內建的黑字 */
  .flatpickr-day { color:var(--m1); border-color:transparent; }
  .flatpickr-day:hover { background:var(--hover); border-color:var(--hover); }
  .flatpickr-day.today { border-color:var(--m3); }
  .flatpickr-day.flatpickr-disabled, .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color:var(--m4); }
  .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
    background:#1e40af; border-color:#1e40af; color:#fff; }
  .flatpickr-day.inRange { background:var(--hover); border-color:var(--hover); box-shadow:-5px 0 0 var(--hover),5px 0 0 var(--hover); }
  .flatpickr-prev-month svg, .flatpickr-next-month svg { fill:var(--m2); }
  [data-theme="light"] .flatpickr-calendar { box-shadow:0 8px 30px rgba(0,0,0,.15); }
  [data-theme="light"] .file-hl { background: rgba(245,158,11,.30); }
  [data-theme="light"] .file-hl .file-pick { color: #92400e !important; }   /* 淺色模式：深棕字 */
</style>
</head>
<body>

      <div class="flex-1"></div>

<!-- ══ 明細卡（選取資料）══ -->
<div id="detail-card" class="hidden fixed right-3 bottom-3 w-[214px] max-w-[calc(100vw-1.5rem)] max-h-[calc(100vh-1.5rem)] flex-col surface border bd rounded-2xl shadow-2xl z-50 overflow-hidden">

    <button id="convert-btn" title="轉換連結" class="bg-indigo-700 hover:bg-indigo-600 text-white font-bold py-1.5 rounded-lg text-[.7rem] transition"><i class="fa-solid fa-plane"></i><span class="btn-txt ml-0.5">轉換</span></button>
  </div>
</div>

<!-- ══ 業務設定 modal ══ -->

  projectId: "ddd1-v3",
  storageBucket: "ddd1-v3.appspot.com",

const auth = getAuth(app);

// ── 全域狀態 ──
let META = null;

// ── 深／淺色主題（記住選擇；沒設過就跟著手機/電腦的系統設定）──
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  $('theme-icon').className = t === 'light' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  localStorage.setItem('d1dt_theme', t);
}
applyTheme(localStorage.getItem('d1dt_theme')
  || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));

//     所以獨立模式改成同一個視窗跳過去（使用者 2026-07-21 回報 WebApp 點合約全空白）
(() => {
  const a = $('contract-list-btn');
  a.href = `${CONTRACT_BASE}/list.html`;
  const standalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  if (standalone) a.removeAttribute('target');

$('theme-btn').onclick = () =>

// 手機：日期／搜尋收在「⚙」裡，需要才展開
$('more-btn').onclick = () => $('more-filters').classList.toggle('max-sm:hidden');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$ = n => n == null ? '--' : n.toLocaleString();
const WD = ['日','一','二','三','四','五','六'];
// 出發日 MM/DD；星期 (一)(二) 依「顯示欄位」的勾選決定（使用者 2026-07-21）
const fmtDt = (iso, withWeek = true) => {
  if (!iso) return '--';
  const [y, m, d] = iso.split('-').map(Number);
  const md = `${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
  return withWeek ? `${md}(${WD[new Date(y, m-1, d).getDay()]})` : md;
};
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
function showPage(id) {
  ['login-page','main-page'].forEach(p => { $(p).classList.toggle('hidden', p !== id); if (p === id) $(p).classList.add('flex'); else $(p).classList.remove('flex'); });
  // 登入後把帳密欄位「停用」：只用 CSS 隱藏的話，iPhone 的密碼管理員照樣偵測得到，
  //   每次進頁面/切頁都跳「要用密碼登入嗎」很擾人。disabled 的欄位會被忽略。（使用者 2026-07-21 反映）
  const off = id !== 'login-page';
  ['login-acc','login-pwd'].forEach(k => { const el = $(k); if (el) { el.disabled = off; if (off) el.value = ''; } });
}

$('login-btn').onclick = doLogin;
$('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function doLogin() {
  let e = $('login-acc').value.trim(), p = $('login-pwd').value;
  if (!e || !p) return $('login-msg').innerText = '請輸入員編和密碼';
  if (!e.includes('@')) e += LEGACY_DOMAIN;
  $('login-msg').innerText = '';
  signInWithEmailAndPassword(auth, e, p).catch(err => {
    $('login-msg').innerText = /invalid-credential|wrong-password|user-not-found/.test(err.code)
      ? '員編或密碼錯誤' : '登入失敗：' + err.code;
  });
}
$('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) return showPage('login-page');
  try {
    UID = user.uid;
    // 登入速度（使用者 2026-07-21）：登入時只讀身分/名片/選單三份小資料（合計約 2KB），
    //   **不預先載入任何團表**（160~580KB）——照舊系統的做法，進來是空白的，
    //   業務自己選了哪條線才載哪條，不會下載到用不上的線。三份小資料同時發出，不排隊。
    const pUser  = getDoc(doc(db, 'users', user.uid));
    const pAgent = getDoc(doc(db, 'dt_agent', user.uid)).catch(() => null);
    const pMeta  = getDoc(doc(db, 'dt_tours', '_meta')).catch(() => null);   // recorder 被規則擋下會失敗，下面本來就會登出

    const snap = await pUser;
    if (!snap.exists()) { $('login-msg').innerText = '權限錯誤：找不到使用者紀錄'; return signOut(auth); }
    // 外部紀錄員（recorder）不開放動態查詢——資料層規則也擋著，這裡是給人看的訊息
    if (snap.data().role === 'recorder') { $('login-msg').innerText = '此帳號沒有動態查詢的使用權限'; return signOut(auth); }
    $('user-name').textContent = snap.data().nickname || snap.data().account || '';
    showPage('main-page');
    // 業務設定（轉換連結名片）
    const ag = await pAgent; AGENT = ag && ag.exists() ? ag.data() : {};
    await boot(await pMeta);
  } catch (err) {
    $('login-msg').innerText = '讀取失敗：' + err.message; signOut(auth);
  }
});

// 資料時間徽章（每次重新檢查都要重畫，「已超過 N 小時」才不會停在載入當下）
function stampBadge() {
  if (!META) return;
  const ageMin = (Date.now() - new Date(META.stamp.replace(' ', 'T'))) / 60000;
  const stale = ageMin > 150;
  $('stamp-badge').className = 'chip ' + (stale ? 'bg-red-900/60 text-red-300' : 'surface2 m1');
  $('stamp-badge').innerHTML = `<i class="fa-regular fa-clock mr-1"></i>資料時間 ${esc(META.stamp.slice(5))}（每小時更新${stale ? '｜⚠ 已超過 ' + Math.round(ageMin / 60) + ' 小時' : ''}）`;
}

// ── 回到前景就檢查有沒有新資料（使用者 2026-07-21）──
//    手機/PWA 放著不關，切回來時畫面還是上次載入的舊資料（中午開的，傍晚看還是中午的餘位），
//    業務可能拿過時餘位去報價。做法：只重抓 _meta（約1KB）比對時間戳，
//    真的換版才清快取重載，沒換就只更新徽章——不打擾正在選團的人。
let LASTCHECK = 0;
async function refreshIfStale() {
  if (document.visibilityState !== 'visible' || !META) return;
  if (Date.now() - LASTCHECK < 60000) return;        // 一分鐘內不重複查
  LASTCHECK = Date.now();
  try {
    const m = await getDoc(doc(db, 'dt_tours', '_meta'));
    if (!m.exists()) return;
    const fresh = m.data();
    if (fresh.stamp === META.stamp) { stampBadge(); return; }   // 沒換版 → 只重算「已超過幾小時」
    META = fresh;
    stampBadge();
    for (const k of Object.keys(RAWCACHE)) delete RAWCACHE[k];   // 換版了，快取全部失效
    for (const k of Object.keys(ROWCACHE)) delete ROWCACHE[k];
    // 正在選團就先不重載——重載會清掉選取，業務報價報到一半會很錯愕。
    //   等他關掉選取卡再更新（下次檢查時 SELLINES 已空）
    if (SELLINES.length) { toast('有新的動態資料，關閉選取後會更新'); return; }
    if ($('f-line').value) await loadFile();
    toast('動態資料已更新');
  } catch { /* 網路不通就等下次 */ }
}
document.addEventListener('visibilitychange', refreshIfStale);
window.addEventListener('focus', refreshIfStale);
setInterval(refreshIfStale, 5 * 60 * 1000);   // 一直開著沒切走的也要更新

// ── 啟動 ──
async function boot(metaSnap) {
  const m = metaSnap || await getDoc(doc(db, 'dt_tours', '_meta'));
  if (!m.exists()) { $('stamp-badge').innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i>還沒有資料'; return; }
  META = m.data();

  stampBadge();

  // 動態選單：顯示漢書原始檔名（跟舊系統一樣）。第一項留空＝進來不預選、不載入任何線。
  const files = [...META.files].sort((a, b) => a.f.localeCompare(b.f));
  $('f-line').innerHTML = '<option value="">請選擇一個動態檔案…</option>' + files.map(f =>
    `<option value="${esc(f.f)}">${esc((f.name || f.line).replace(/\.txt$/i, '').replace(/\s+/g, ' '))}</option>`).join('');
  $('f-line').value = '';

  // 日期預設空白＝不篩（使用者 2026-07-21）。以前預設帶「今天～一年後」，
  //   等於一進來就在篩選狀態，過去的團看不到也不明顯。

  // 進來不自動載入任何線（舊系統做法）：秒進畫面，選了才載
  $('raw-view').innerHTML =
    '<div class="m3 text-center py-16"><i class="fa-regular fa-folder-open text-4xl mb-3 block opacity-40"></i>' +
    '請先從上方「動態」選擇一個檔案</div>';
}

// ── 載入一個漢書檔（原文＋解析資料）──
async function loadFile() {
  const fno = $('f-line').value;
  if (!fno) {          // 選回「請選擇…」→ 回到空白提示，不打網路
    LINES = []; VISIBLE = []; SELLINES = [];
    $('detail-card').classList.add('hidden');
    $('raw-view').innerHTML =
      '<div class="m3 text-center py-16"><i class="fa-regular fa-folder-open text-4xl mb-3 block opacity-40"></i>' +
      '請先從上方「動態」選擇一個檔案</div>';
    return;
  }
  localStorage.setItem('d1dt_line', fno);
  $('raw-view').innerHTML = '<div class="m3 p-6"><i class="fa-solid fa-spinner fa-spin mr-2"></i>載入中…</div>';

  if (!RAWCACHE[fno]) {
    const [rawSnap, rowSnap] = await Promise.all([
      getDoc(doc(db, 'dt_raw', fno)),
      getDoc(doc(db, 'dt_tours', fno)),
    ]);
    RAWCACHE[fno] = rawSnap.exists() ? rawSnap.data() : { text: '' };
    ROWCACHE[fno] = rowSnap.exists() ? JSON.parse(rowSnap.data().rows) : [];
  }

  // 行 → 團 的對應（用原始行文字比對；漢書同團重複列出的行會對到同一團，正常）
  const rowByRaw = new Map();
  for (const r of ROWCACHE[fno]) if (r.rw) rowByRaw.set(r.rw, r);

  const secRe = /^[\s"]*■/;
  const headerRe = /備註/;
  LINES = RAWCACHE[fno].text.split('\n').map((t0, i) => {
    const text = t0.replace(/\r$/, '').trimEnd();
    const row = rowByRaw.get(text) || null;
    const isSec = secRe.test(text) && !headerRe.test(text) && !/★/.test(text);
    return { i, text, row, isSec };
  });

  // 地區選單：分區標題行
  const secs = LINES.filter(l => l.isSec && l.text.replace(/[■▆▂▄*＊\s　"]/g, ''));
  $('f-region').innerHTML = '<option value="">全部地區</option>' + secs.map(l =>
    `<option value="${l.i}">${esc(l.text.replace(/[■▆▂▄*＊\s　"]/g, ''))}</option>`).join('');

  SELLINES = []; ANCHOR = -1; SHAREDFILE = null; CHOSENFILES = {};   // 換檔＝全新報價，行程重來
  hideCard();
  render();
}

// ── 呈現（保留漢書原樣，只做過濾和上色）──
// 團號列的樣子（含 ======0909A5 延續寫法）——篩選時用來擋「解析失敗但其實是團」的行
const CODE_LINE = /[A-Z]{2,3}\d[A-Z0-9]{2}\d{4}[A-Z]\d|[=＝]{4,}\d{4}[A-Z]\d/;

// ── 出發日範圍（使用者 2026-07-21：改成一格範圍選取，預設空白＝不篩日期）──
//    ['',''] 代表沒設限；只選一天時頭尾同一天。日期一律自己組字串，不用 toISOString（會差時區）
let DATERANGE = ['', ''];
const ymd = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
const fpDate = flatpickr('#f-date', {
  mode: 'range', dateFormat: 'Y-m-d', locale: 'zh_tw',
  onChange(sel) {
    DATERANGE = sel.length === 2 ? [ymd(sel[0]), ymd(sel[1])]
              : sel.length === 1 ? [ymd(sel[0]), ymd(sel[0])] : ['', ''];
    $('f-date-clear').classList.toggle('hidden', !sel.length);
    render();
  },
});
$('f-date-clear').onclick = e => {
  e.stopPropagation();
  fpDate.clear();                     // clear() 不會觸發 onChange，狀態自己收
  DATERANGE = ['', ''];
  $('f-date-clear').classList.add('hidden');
  render();
};
function render() {
  const [from, to] = DATERANGE;
  const q = $('f-search').value.trim().toUpperCase();
  const regionStart = $('f-region').value === '' ? -1 : +$('f-region').value;

  // 地區範圍：選定分區 → 只顯示該分區到下一個分區之間
  let regionEnd = Infinity;
  if (regionStart >= 0) {
    const next = LINES.find(l => l.isSec && l.i > regionStart);
    regionEnd = next ? next.i : Infinity;
  }

  const promoOn = $('f-promo').classList.contains('on');
  const availOn = $('f-avail').classList.contains('on');
  const filtering = !!(q || promoOn || availOn || from || to);   // 日期也算篩選（空掉的分區要收起來）

  // 這一團過不過篩選
  const rowPass = r =>
    !(from && r.dt && r.dt < from) && !(to && r.dt && r.dt > to) &&
    !(promoOn && !r.pm) && !(availOn && !(r.r > 0));

  // 先掃一遍：哪些團留下來、各分區底下還有沒有團
  //（有篩選時要把空掉的分區標題也藏起來，不然畫面一堆標題沒東西）
  const pass = new Set();
  const secHasRow = new Set();
  const secOf = new Map();      // 每一行屬於哪個分區（篩選時要判斷摘要行留不留）
  let curSec = -1;
  for (const l of LINES) {
    if (l.isSec) curSec = l.i;
    secOf.set(l.i, curSec);
    if (!l.isSec && l.row && rowPass(l.row) && (!q || l.text.toUpperCase().includes(q))) {
      pass.add(l.i);
      if (curSec >= 0) secHasRow.add(curSec);
    }
  }

  const out = [];
  for (const l of LINES) {
    if (regionStart >= 0 && (l.i < regionStart || l.i >= regionEnd)) continue;
    if (l.row) {
      if (!pass.has(l.i)) continue;
      let h = esc(l.text);
      // 團號上色（跟舊系統一樣把團號標成藍色塊）
      // 只標團號裡的日期四碼（跟舊系統一樣），不是整串團號
      h = h.replace(/([A-Z]{2,3}\d[A-Z0-9]{2}|[=＝]{4,})(\d{4})(?=[A-Z]\d)/, (m, pre, dt) => `${pre}<span class="code">${dt}</span>`);
      h = h.replace(/(&quot;促銷&quot;)/g, '<span class="promo">$1</span>');
      out.push(`<div class="hl hl-tour ${SELLINES.includes(l.i) ? 'sel' : ''}" data-i="${l.i}">${h}</div>`);
    } else if (l.isSec) {
      if (filtering && !secHasRow.has(l.i)) continue;   // 這區沒有符合的團就整個不顯示
      out.push(`<div class="hl hl-sec">${esc(l.text)}</div>`);
    } else {
      // 篩選中：保留「這一區還有團」的摘要行（●團／時●、團型定價、利潤、去/回程班機、欄位表頭），
      //   業務要看航班時間與成本才好報價（使用者 2026-07-21）。三個條件都要成立才留：
      //   ① 這一區還有團 ② 有中文（純裝飾線 ▆▆▆／====／■(50+47)■ 丟掉）
      //   ③ ⚠ 不是團號列——解析失敗的團 l.row 會是空的，不擋的話「被篩掉的團」會從這裡漏回畫面
      if (filtering && (!secHasRow.has(secOf.get(l.i)) || !/[一-鿿]/.test(l.text) || CODE_LINE.test(l.text))) continue;
      out.push(`<div class="hl m2">${esc(l.text) || ' '}</div>`);
    }
  }
  $('raw-view').innerHTML = out.join('') || '<div class="m3 p-6">沒有符合條件的團</div>';
  $('count-badge').textContent = filtering ? `${pass.size} 團` : '';
  VISIBLE = [...$('raw-view').querySelectorAll('.hl-tour')].map(el => +el.dataset.i);
  $('raw-view').querySelectorAll('.hl-tour').forEach(el => el.onclick = e => selectLine(+el.dataset.i, e));
}

// ── 選取（照舊系統）──
//    點一團＝加進來（再點一次取消）；Shift＋點＝從上一個選到這裡整段框起來。
//    這樣連點好幾團就會一直累加，不用按著 Ctrl。
function selectLine(i, e) {
  const l = LINES[i];
  if (!l || !l.row) return;
  if (e && e.shiftKey && ANCHOR >= 0) {
    const a = VISIBLE.indexOf(ANCHOR), b = VISIBLE.indexOf(i);
    if (a >= 0 && b >= 0) {
      const [lo, hi] = a <= b ? [a, b] : [b, a];
      SELLINES = VISIBLE.slice(lo, hi + 1);          // 只框「目前看得到」的行，不會把被篩掉的偷偷選進去
    }
  } else {
    SELLINES = SELLINES.includes(i) ? SELLINES.filter(x => x !== i) : [...SELLINES, i];
    ANCHOR = i;
  }
  document.getSelection()?.removeAllRanges();        // Shift 點擊會反白整片文字，清掉
  render();
  showDetail();
}
const selRows = () => SELLINES.map(i => LINES[i]?.row).filter(Boolean);

// ── 明細卡欄位設定（照舊系統：預設只顯示團費/航空/出發日/天數，其他用「顯示欄位」勾）──
// 只留這四個（使用者 2026-07-19：其他欄位用不到）
const DFIELDS = [
  { k: 'an',  name: '航空公司', def: 1 },
  { k: 'dt',  name: '出發日',   def: 1 },
  { k: 'wk',  name: '　└ 星期', def: 1 },   // 出發日要不要帶 (一)(二)（使用者 2026-07-21）
  { k: 'dy',  name: '天數',     def: 1 },
  { k: 'r',   name: '剩餘名額', def: 1 },
];
let dshow = JSON.parse(localStorage.getItem('d1dt_dfields') || 'null')
  || Object.fromEntries(DFIELDS.map(f => [f.k, !!f.def]));
// 之後新增的欄位，舊使用者存的設定裡不會有 → 補預設值，
//   不然新欄位會被當成「沒勾」（例如星期原本一直有顯示，改版後突然不見）
for (const f of DFIELDS) if (!(f.k in dshow)) dshow[f.k] = !!f.def;

function buildDMenu() {
  $('dcol-menu').innerHTML = DFIELDS.map(f =>
    `<label class="flex items-center gap-2 py-1 text-sm cursor-pointer select-none">
      <input type="checkbox" class="accent-blue-500" data-k="${f.k}" ${dshow[f.k] ? 'checked' : ''}>${f.name}
    </label>`).join('');
  $('dcol-menu').querySelectorAll('input').forEach(cb => cb.onchange = () => {
    dshow[cb.dataset.k] = cb.checked;
    localStorage.setItem('d1dt_dfields', JSON.stringify(dshow));
    showDetail();
  });
}
$('dcol-btn').onclick = e => { e.stopPropagation(); buildDMenu(); $('dcol-menu').classList.toggle('hidden'); };
document.addEventListener('click', e => { if (!$('dcol-menu').contains(e.target) && e.target !== $('dcol-btn')) $('dcol-menu').classList.add('hidden'); });

// ── 明細區塊 ──
//    同價位、同航空、同天數、同產品的團合併成一塊，只在「出發日」那排多列幾個日期
//    （使用者 2026-07-18：同價位商品只是日期不同，顯示在同一個就好）
// 同組＝同價、同航空、同天數、同產品、同團型、同特價（團型/特價一起納入，避免不同團型
// 剛好算出同一個售價被誤併成一組）
// 時段（早/午/晚班）也納入分組——同航班不同時段是不同團，不可合併（使用者 2026-07-20）
const groupKey = r => [r.pr, r.an, r.dy, r.p, r.gw, r.dp, r.tt || '', r.adj || 0, r.fl || ''].join('|');
const anWithFlight = r => esc(r.an) + (r.fl ? `（${r.fl}）` : '');   // 酷航（午）
// 業務手動切換的團型（key = groupKey）。只存在這次瀏覽，重整就回到漢書上的原團型
const TTPICK = {};
// 每團可能不一樣的欄位：合併顯示時要跟著日期一筆一筆列，不能只印一個
const PERTOUR = [
  { k: 'r', name: '剩餘', get: r => `<span class="${r.r === 0 ? 'text-red-400' : r.r <= 5 ? 'text-amber-300' : 'text-emerald-400'}">${r.r === 0 ? '滿' : r.r}</span>` },
];

function groupBlock(g, multi) {
  const r0 = g[0];
  const line = (k, v) => `<div class="dline flex justify-between py-1.5 border-b bd2 gap-3"><span class="m3 shrink-0">${k}</span><span class="font-bold text-right">${v}</span></div>`;
  const parts = [];
  if (g.some(r => r.pm)) parts.push(`<div class="mb-1.5"><span class="chip bg-pink-900/60 text-pink-300">促銷</span></div>`);

  // ── 團費（可切換團型）──
  //   漢書上的售價 = 該團型定價 + 本團特價（例：精彩 25,900 −2,000 = 23,900）
  //   換團型後特價還算不算，公司沒有硬規則 → 兩個數字都列出來，業務自己判斷
  const gk = groupKey(r0);
  const alts = r0.alt || null;
  const picked = TTPICK[gk] || r0.tt;
  const adj = r0.adj || 0;
  // 定價：有團型清單就用該團型的；沒有清單（只有一種團型）就回推 定價 = 售價 − 調價
  const base = alts ? (alts.find(a => a[0] === picked)?.[1] ?? null)
                    : (adj !== 0 ? r0.pr - adj : null);
  const shown = base != null ? base + adj : r0.pr;
  const switched = alts && picked !== r0.tt;

  if (alts) {
    parts.push(line('團型',
      `<select data-gk="${esc(gk)}" class="tt-pick input-style !py-0.5 !px-1.5 !text-xs font-bold">
        ${alts.map(a => `<option value="${esc(a[0])}" ${a[0] === picked ? 'selected' : ''}>${esc(a[0])}${a[0] === r0.tt ? '（原）' : ''}</option>`).join('')}
      </select>`));
  } else if (r0.tt) {
    parts.push(line('團型', esc(r0.tt)));
  }
  parts.push(line('團費', `<span class="price text-lg">${fmt$(shown)}</span>`));
  if (base != null && adj !== 0) {
    parts.push(`<div class="text-[.65rem] m3 text-right pb-1.5 border-b bd2">定價 ${fmt$(base)}　${adj > 0 ? '票 +' : '特價 −'}${fmt$(Math.abs(adj))}${switched ? '<br><span class="text-amber-500">（換團型後特價是否適用請自行確認）</span>' : ''}</div>`);
  } else if (switched) {
    parts.push(`<div class="text-[.65rem] m3 text-right pb-1.5 border-b bd2">已切換團型，原為 ${esc(r0.tt)}</div>`);
  }
  if (dshow.an) parts.push(line('航空公司', anWithFlight(r0)));
  if (dshow.dt) parts.push(line('出發日', `<span class="inline-flex flex-wrap gap-1 justify-end">${g.map(r => `<span class="chip bg-[#1a2c50] text-slate-200" title="${esc(r.c)}">${fmtDt(r.dt, !!dshow.wk)}</span>`).join('')}</span>`));
  if (dshow.dy) parts.push(line('天數', r0.dy ? r0.dy + '天' : '--'));
  if (dshow.p)  parts.push(line('產品', `${esc(r0.p)}${r0.gw !== '直飛' ? '｜' + esc(r0.gw) : ''}${r0.dp !== '台北' ? '｜' + esc(r0.dp) + '出發' : ''}`));

  const cols = PERTOUR.filter(f => dshow[f.k]);
  if (cols.length) {
    if (g.length === 1) {
      cols.forEach(f => parts.push(line(f.name === '剩餘' ? '剩餘名額' : f.name, f.get(r0))));
    } else {
      // 多團合併：日期一列，後面接各自的機位/餘位…
      parts.push(
        `<div class="pt-2 overflow-x-auto"><table class="w-full text-xs">
          <thead><tr class="m3"><th class="text-left font-bold pb-1">出發日</th>${cols.map(f => `<th class="text-right font-bold pb-1 pl-3">${f.name}</th>`).join('')}</tr></thead>
          <tbody>${g.map(r => `<tr class="border-t bd2"><td class="py-1">${fmtDt(r.dt, !!dshow.wk)}</td>${cols.map(f => `<td class="text-right pl-3">${f.get(r)}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>`);
    }
  }
  if (dshow.bs) {
    const bsAll = g.map(r => {
      const bs = (r.bs || []).map(([n, x, paid]) => `<span class="chip ${paid ? 'bg-emerald-900/50 text-emerald-300' : 'bg-slate-800 m2'}" title="${paid ? '已收訂' : '卡位未收款'}">${esc(n)}${x}</span>`).join(' ');
      return bs ? `<div class="mt-1.5"><span class="m4 text-[.65rem]">${fmtDt(r.dt, !!dshow.wk)}</span> ${bs}</div>` : '';
    }).join('');
    if (bsAll) parts.push(`<div class="pt-2"><span class="m3 text-xs">報名明細</span>${bsAll}</div>`);
  }
  // 行程檔案：預設用「共同行程」（見 action bar 的行程鈕）。只有這一組「單獨改」過才在這裡顯示，
  //   或多組時給一個小連結讓業務把某一組換成別的行程（早班/午班）。單一組就不顯示，保持乾淨。
  const cf = CHOSENFILES[gk];
  if (cf) {
    parts.push(`<div class="mt-2 px-2 py-1.5 bg-amber-900/30 border border-amber-700/50 rounded-lg text-xs flex items-center gap-1.5">
         <i class="fa-regular fa-file-pdf text-amber-400 shrink-0"></i>
         <button class="gfile-open flex-1 truncate m1 text-left hover:text-blue-400 hover:underline" data-id="${esc(cf.id)}" title="點擊開啟行程表">本組另用：${esc(cf.n)}</button>
         <button class="gfile-clear m3 hover:text-red-400 shrink-0 w-5" data-gk="${esc(gk)}" title="改回共同行程"><i class="fa-solid fa-xmark"></i></button>
       </div>`);
  } else if (multi) {
    parts.push(`<button class="gfile-pick mt-1.5 text-[.68rem] m3 hover:text-blue-400 underline" data-gk="${esc(gk)}">
         <i class="fa-regular fa-folder-open"></i> 這組單獨換行程
       </button>`);
  }
  return parts.join('');
}

function showDetail() {
  const rows = selRows();
  if (!rows.length) { hideCard(); return; }
  // 依「價格+航空+天數+產品」分組，同組只出一塊、日期併排
  const groups = [];
  const idx = new Map();
  for (const r of rows) {
    const k = groupKey(r);
    if (!idx.has(k)) { idx.set(k, groups.length); groups.push([]); }
    groups[idx.get(k)].push(r);
  }
  groups.forEach(g => g.sort((a, b) => (a.dt || '').localeCompare(b.dt || '')));
  $('detail-count').textContent = `（共 ${rows.length} 筆${groups.length < rows.length ? '／' + groups.length + ' 種' : ''}）`;
  const multi = groups.length > 1;
  $('detail-body').innerHTML =
    groups.map(g => `<div class="mb-3 pb-1">${groupBlock(g, multi)}</div>`).join('<div class="border-t-2 bd mb-3"></div>');
  updateSharedFile();
  // 團型下拉：選了就記住並重畫（只影響畫面，不會動到漢書資料）
  $('detail-body').querySelectorAll('.tt-pick').forEach(sel => {
    sel.onchange = () => { TTPICK[sel.dataset.gk] = sel.value; showDetail(); };
    sel.onpointerdown = e => e.stopPropagation();
  });
  // 各組的行程檔案：選 / 移除
  $('detail-body').querySelectorAll('.gfile-pick').forEach(btn => {
    btn.onpointerdown = e => e.stopPropagation();
    btn.onclick = e => { e.stopPropagation(); FILEPICK_GK = btn.dataset.gk; openFiles(); };
  });
  $('detail-body').querySelectorAll('.gfile-clear').forEach(btn => {
    btn.onpointerdown = e => e.stopPropagation();
    btn.onclick = e => { e.stopPropagation(); delete CHOSENFILES[btn.dataset.gk]; showDetail(); };
  });
  // 點某組行程檔名 → 開 Drive 預覽
  $('detail-body').querySelectorAll('.gfile-open').forEach(btn => {
    btn.onpointerdown = e => e.stopPropagation();
    btn.onclick = e => { e.stopPropagation(); window.open(`https://drive.google.com/file/d/${btn.dataset.id}/view`, '_blank', 'noopener'); };
  });
  // 合約防呆：一團一份，選多筆就反灰不能點（使用者 2026-07-21）。
  //   用行內樣式，不用 Tailwind class——CDN 版對 JS 動態加的 class 不一定即時生成
  const one = rows.length === 1;
  const cbtn = $('contract-btn');
  cbtn.disabled = !one;
  cbtn.style.opacity = one ? '' : '.4';
  cbtn.style.cursor = one ? '' : 'not-allowed';
  cbtn.title = one ? '建立合約（帶團號＋團費開合約系統）' : '合約一次一團，請只選一筆';
  showCard();
}
$('detail-close').onclick = () => { hideCard(); SELLINES = []; ANCHOR = -1; SHAREDFILE = null; CHOSENFILES = {}; $('dcol-menu').classList.add('hidden'); render(); };

// ── 明細卡：顯示／隱藏（顯示要用 flex，且顯示後重新校正位置把整張卡拉回畫面內，
//    確保底部按鈕不會掉出畫面被切掉）──
const _card = $('detail-card'), _head = $('detail-head');
const isMobile = () => matchMedia('(max-width: 640px)').matches;
// 把卡片限制在畫面內：先量真實高度（要先 flex 顯示才量得到），再夾住座標
function clampCard(x, y) {
  const w = _card.offsetWidth || 214, h = _card.offsetHeight || 200;
  x = Math.max(4, Math.min(x, innerWidth - w - 4));
  y = Math.max(4, Math.min(y, innerHeight - h - 4));
  _card.style.left = x + 'px'; _card.style.top = y + 'px';
  _card.style.right = 'auto'; _card.style.bottom = 'auto';
  return { x, y };
}
function hideCard() { _card.classList.add('hidden'); _card.classList.remove('flex'); }
function showCard() {
  _card.classList.remove('hidden'); _card.classList.add('flex');    // flex 才會撐開 head/body/按鈕三層
  const saved = JSON.parse(localStorage.getItem('d1dt_cardpos') || 'null');
  // 沒拖過就維持 CSS 的右下角預設（right-3 bottom-3 + max-h，天然不會超出畫面）；
  // 拖過的話等這一幀有真實高度再夾一次，確保底部按鈕不被切掉
  if (saved) requestAnimationFrame(() => clampCard(saved.x, saved.y));
}

// ── 明細卡可拖曳（抓標題列移動，位置記住；視窗縮小時自動拉回畫面內）──
(function makeDraggable() {
  let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
  _head.addEventListener('pointerdown', e => {
    // 電腦、手機都可以拖；但點按鈕／欄位選單／勾選框不算拖曳
    // （選單掛在標題列裡，之前拖曳把勾選的點擊搶走，造成「顯示欄位」勾了沒反應）
    if (e.target.closest('button') || e.target.closest('#dcol-menu') || e.target.closest('input,label')) return;
    const r = _card.getBoundingClientRect();
    dragging = true; sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
    _head.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  _head.addEventListener('pointermove', e => {
    if (!dragging) return;
    const p = clampCard(ox + e.clientX - sx, oy + e.clientY - sy);
    localStorage.setItem('d1dt_cardpos', JSON.stringify(p));
  });
  const stop = e => { if (dragging) { dragging = false; try { _head.releasePointerCapture(e.pointerId); } catch {} } };
  _head.addEventListener('pointerup', stop);
  _head.addEventListener('pointercancel', stop);
  addEventListener('resize', () => {
    if (!_card.classList.contains('hidden') && _card.style.left)
      clampCard(parseFloat(_card.style.left), parseFloat(_card.style.top));
  });
})();

// 價格跟著業務當下選的團型走（沒切換就是漢書原價）
function priceOfRow(r) {
  const p = TTPICK[groupKey(r)];
  if (!p || !r.alt || p === r.tt) return { price: r.pr, tt: r.tt };
  const base = r.alt.find(a => a[0] === p)?.[1];
  return base == null ? { price: r.pr, tt: r.tt } : { price: base + (r.adj || 0), tt: p };
}
// 報價文案（團費/航空/出發日/天數 ＋ 行程檔名 ＋ 連結）
//   linkByFileId：{ 檔案id: 網址 }。同一份行程只出一條連結（同行程不同日期＝一條，使用者 2026-07-21）
function buildQuoteText(linkByFileId) {
  const rows = selRows();
  // 文案要跟「顯示欄位」的勾選一致——原本天數是寫死的，取消勾選還是會出現（使用者 2026-07-21 回報）
  const mmdd = iso => fmtDt(iso, !!dshow.wk);
  const anFull = an => /航$|航空$/.test(an) ? an : an + '航空';   // 易斯達→易斯達航空
  // 先照 groupKey 分價格區塊（跟卡片一致），再按「實際用的行程檔案」分桶：同檔＝同一條連結
  const groups = [], gidx = new Map();
  for (const r of rows) {
    const gk = groupKey(r);
    if (!gidx.has(gk)) { gidx.set(gk, groups.length); groups.push({ gk, r0: r, dates: [] }); }
    groups[gidx.get(gk)].dates.push(mmdd(r.dt));
  }
  const blockOf = g => {
    const { price } = priceOfRow(g.r0);
    const ls = [`【團費：${fmt$(price)}】`];
    if (dshow.an) ls.push(`航空公司：${anFull(g.r0.an)}${g.r0.fl ? `（${g.r0.fl}班）` : ''}`);
    if (dshow.dt) ls.push(`出發日：${g.dates.join('、')}`);
    if (dshow.dy) ls.push(`天數：${g.r0.dy ? g.r0.dy + '天' : '--'}`);
    return ls.join('\n');
  };
  const buckets = [], bidx = new Map();
  for (const g of groups) {
    const f = effFile(g.gk);
    const key = f ? 'f:' + f.id : 'x:' + g.gk;   // 沒檔案的各自一桶
    if (!bidx.has(key)) { bidx.set(key, buckets.length); buckets.push({ file: f, blocks: [] }); }
    buckets[bidx.get(key)].blocks.push(blockOf(g));
  }
  return buckets.map(b => {
    let t = b.blocks.join('\n\n');
    const url = b.file && linkByFileId && linkByFileId[b.file.id];
    if (b.file || url) t += `\n\n行程表如下列連結：${b.file ? '\n' + b.file.n : ''}${url ? '\n' + url : ''}`;
    return t;
  }).join('\n\n');
}

// 複製到剪貼簿（跨手機/桌機）。buildText 可能含 fetch（轉換要先產短網址）。
//   iOS Safari 規定：await 之後再 writeText 會被擋（「not allowed by user agent」，使用者 2026-07-22 手機回報）。
//   解法：手勢當下就用 ClipboardItem 帶 Promise「預約」，網址晚點算好再填進去，手勢不會斷。
async function copyText(buildText) {
  const p = Promise.resolve().then(buildText);   // 只跑一次（含 fetch）
  p.catch(() => {});                             // 避免 unhandled rejection
  if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
    try {
      await navigator.clipboard.write([new ClipboardItem({
        'text/plain': p.then(t => new Blob([t], { type: 'text/plain' })),
      })]);
      return;                                    // iOS/桌機都吃這條
    } catch (e) { /* ClipboardItem 被擋或不支援 → 往下退回 */ }
  }
  const text = await p;                          // buildText 失敗（fetch 403 等）會在這裡拋出
  try { await navigator.clipboard.writeText(text); }
  catch { showCopyBox(text); }                   // 最後退路：跳出可手動複製的方框
}
// 手動複製方框（自動選取，方便長按複製）——所有自動複製都失敗時的保底
function showCopyBox(text) {
  let box = $('copybox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'copybox';
    box.className = 'hidden fixed inset-0 bg-black/70 z-[80] flex items-center justify-center p-4';
    box.innerHTML = `<div class="surface border bd rounded-2xl w-full max-w-md shadow-2xl p-4">
      <div class="flex items-center justify-between mb-2"><span class="font-bold text-sm">請長按下方文字複製</span>
        <button id="copybox-close" class="m2 hover:text-red-400 w-7 h-7"><i class="fa-solid fa-xmark"></i></button></div>
      <textarea id="copybox-text" class="w-full input-style text-xs" rows="10" readonly></textarea></div>`;
    document.body.appendChild(box);
    $('copybox-close').onclick = () => box.classList.add('hidden');
    box.onclick = e => { if (e.target === box) box.classList.add('hidden'); };
  }
  $('copybox-text').value = text;
  box.classList.remove('hidden');
  requestAnimationFrame(() => { const t = $('copybox-text'); t.focus(); t.select(); });
}

$('copy-btn').onclick = () => {
  const rows = selRows(); if (!rows.length) return;
  const priceOf = priceOfRow;
  let txt;
  const files = [SHAREDFILE, ...Object.values(CHOSENFILES)].filter(Boolean);
  if (files.length) {
    // 有掛行程 → 報價區塊 ＋ 每份行程一條 Drive 連結（同份只出一條）
    const links = {};
    for (const f of files) links[f.id] = `https://drive.google.com/file/d/${f.id}/view?usp=drivesdk`;
    txt = buildQuoteText(links);
  } else {
    // 沒選檔案 → 純摘要（產品 團型 天數｜出發日｜航空｜團費）
    const g2 = [];
    const im = new Map();
    for (const r of rows) {
      const { price, tt } = priceOf(r);
      const head = `${r.p}${tt ? ' ' + tt : ''}${r.dy ? ' ' + r.dy + '天' : ''}`;
      const k = [head, r.an, price].join('|');
      if (!im.has(k)) { im.set(k, g2.length); g2.push({ head, an: r.an, price, dates: [] }); }
      g2[im.get(k)].dates.push(fmtDt(r.dt, !!dshow.wk) + ' 出發' + (dshow.r ? `（餘 ${r.r} 位）` : ''));
    }
    txt = g2.map(g => g.dates.length === 1
      ? `${g.head}｜${g.dates[0]}｜${g.an}｜團費 ${fmt$(g.price)}`
      : `${g.head}｜${g.an}｜團費 ${fmt$(g.price)}\n` + g.dates.map(d => '　' + d).join('\n')
    ).join('\n\n');
  }
  const nf = new Set(files.map(f => f.id)).size;
  copyText(() => txt).then(() => toast(nf ? `已複製報價＋${nf > 1 ? nf + ' 份' : ''}行程連結` : `已複製 ${rows.length} 筆摘要`));
};

// ── 行程檔案樹（dt_files 由同步程式維護；還沒開通就顯示說明）──
let filesMode = 'related';   // related=只列相關｜all=瀏覽全樹

// 這次要幫哪一組挑檔案 → 回傳那一組的代表團（相關行程的評分依它而定）
function pickTarget() {
  const rows = selRows();
  if (!rows.length) return null;
  return rows.find(r => groupKey(r) === FILEPICK_GK) || rows[0];
}
async function openFiles() {
  if (!selRows().length) return;
  $('files-modal').classList.remove('hidden');
  // 套用上次拖到的位置（沒拖過就維持 CSS 預設：置中上方）
  const savedPos = JSON.parse(localStorage.getItem('d1dt_filespos') || 'null');
  if (savedPos) requestAnimationFrame(() => {
    const c = $('files-modal'), w = c.offsetWidth, h = c.offsetHeight;
    c.style.left = Math.max(4, Math.min(savedPos.x, innerWidth - w - 4)) + 'px';
    c.style.top = Math.max(4, Math.min(savedPos.y, innerHeight - h - 4)) + 'px';
    c.style.transform = 'none';
  });
  if (!FILETREE) {

// ── 團 → 行程檔案配對（使用者 2026-07-20：點團自動列出相關行程，不用一層層點）──
// 檔名命名很規律：0701~1024=精彩北越5日-星宇航空-台北出發。用團型/天數/出發地/航空/期間評分。

function findLineFolder(lineName) {

    || (FILETREE.children || []).find(c => clean(c.name).includes(ln))

// 掃這個資料夾下所有 PDF，回傳「最相符」那幾個的 id（分數夠高才標，避免亂標）
// 雜項過濾（讓畫面像舊系統一樣清爽，只留正式行程）——保守：只藏最明確的
//   資料夾：圖片/素材/照片…等非行程夾，或複製/副本/備份夾
//   檔案：複製/副本/舊版/作廢…（「舊金山」的「舊」不會誤中，因為只認「(舊)」「舊版」等）
const isNoiseFolder = name => /圖片|素材|照片|相片|海報|文宣|封面|備份|複製|副本|舊(?!金山)/.test(name);

// 全形正規化：漢書「雪＋墨」的全形＋、全形／要對得上資料夾「雪+墨」的半形
const nz = s => (s || '').replace(/＋/g, '+').replace(/／/g, '/').replace(/　/g, '');
// 全形數字→半形（航班選項代號：漢書寫 ２、檔名可能寫 (２) 或 (2)）

function bestMatchIds(folder, t) {

    const hay = nz(x.f.n + ' ' + x.path);

    const dh = dw.length ? dw.some(d => hay.includes(d)) : true;   // 沒目的地資料就不設限

function inFilePeriod(nm, dt) {
  if (!dt) return null;

  CX: '國泰', CA: '國航', MU: '東方', CZ: '南方', MF: '廈航', HU: '海航', HO: '吉祥', FM: '上航',
  JL: '日航', NH: '全日空', MM: '樂桃', KE: '大韓', OZ: '韓亞', TG: '泰航', SL: '獅航', VZ: '越捷',
  SQ: '新航', MH: '馬航', VN: '越航', VJ: '越捷', PR: '菲航', EK: '阿聯酋', QR: '卡達', TK: '土航',
  NX: '澳航', ZE: '易斯達', '7C': '濟州', TW: '德威', BX: '釜山',

};
// 航空衝突：檔名/路徑明確標了「別家」航空（不是這團的）→ 硬條件，直接不配（使用者 2026-07-22：JX 星宇團被配到 AK 亞航）

function scoreFile(t, f, path) {

  // 目的地／路線（最強訊號）：檔名或所在資料夾含這團目的地 → 大加分。
  //   產品線名（雪+墨、美西）比國家名（澳洲）精確 → 權重更高，才能跟隔壁同國團分清楚。

    }

  //   ⚠ 精確比對時段組合（午晚/早午）或括號單一時段（(午)/（午）），
  //   不能用「午班」模糊比對——「早午班機」資料夾含「午班」會誤中！

    const combo = { 午: '午晚', 晚: '午晚', 早: '早午', 夜: '午晚' }[t.fl];

    //   （東京 TR：預設 TR866 0645去/TR867 1230回＝早午；有「午」記號才是 TR874 1530去/TR875 2115回＝午晚）
    //   使用者 2026-07-21 指正：沒標記的團被配到午晚行程是錯的。
    s -= 10;
  }
  // 天數：阿拉伯/中文 ×「日」或「天」，另認泰國常見的「6D4N」＝6天4夜（使用者 2026-07-21）

      || (/^[A-Z0-9]{2}$/.test(alCode) && new RegExp('[＝=(\\-\\s／/]' + alCode + '(?![A-Za-z0-9])').test(hay))) s += 4;

  if (p === true) s += 3; else if (p === false) s -= 6;         // 期間明確不符 → 壓下去

}

function renderFiles() {
  if (!FILETREE) return;
  const q = $('files-search').value.trim().toLowerCase();
  const related = filesMode === 'related';
  $('tab-related').className = 'px-3 py-1.5 ' + (related ? 'bg-blue-600 text-white' : 'm2');
  $('tab-all').className = 'px-3 py-1.5 ' + (!related ? 'bg-blue-600 text-white' : 'm2');
  $('files-expand').classList.toggle('hidden', related);
  $('files-collapse').classList.toggle('hidden', related);

  const fmtTime = ms => { if (!ms) return ''; const d = new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const fileRow = (f, pad, hl) =>
    `<div class="flex justify-between items-center py-1.5 pr-2 hover:bg-[#1a2336] rounded gap-2 ${hl ? 'file-hl' : ''}" ${hl ? 'data-hl="1"' : ''} style="padding-left:${pad}rem">
      <button class="file-pick ${hl ? 'text-amber-300 font-bold' : 'text-blue-400'} hover:underline text-left" data-id="${esc(f.id)}" data-n="${esc(f.n)}">${hl ? '⭐ ' : ''}${esc(f.n.replace(/\.pdf$/i,''))}</button>
      <span class="shrink-0 flex items-center gap-2">
        <span class="m4 text-xs">${fmtTime(f.t)}</span>
        <a href="https://drive.google.com/file/d/${esc(f.id)}/view" target="_blank" rel="noopener" title="預覽" class="m3 hover:text-blue-400"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>
      </span>
    </div>`;

  // 樹狀節點（forceOpen＝相關行程模式全展開；bestIds＝要標星號的檔案）
  const node = (n, depth, forceOpen, bestIds) => {
    if (n.files === undefined) return '';
    const kids = (n.children || []).filter(c => !isNoiseFolder(c.name)).map(c => node(c, depth + 1, forceOpen, bestIds)).join('') +
      (n.files || []).filter(f => /\.pdf$/i.test(f.n) && !isNoiseFile(f.n) && (!q || f.n.toLowerCase().includes(q))).map(f => fileRow(f, depth * 1.25 + 1, bestIds && bestIds.has(f.id))).join('');
    if (q && !kids) return '';
    const open = forceOpen || expandAll || q || depth === 0;
    return `<details ${open ? 'open' : ''} style="padding-left:${depth ? 1.25 : 0}rem">
      <summary class="cursor-pointer py-1 font-bold m1 hover:text-white select-none">${esc(n.name)}</summary>${kids}</details>`;
  };

  if (related) {
    // 相關行程：直接展開「這條產品線」的資料夾樹，保留原本分組，最相符的標星號
    const t = pickTarget();
    const folder = findLineFolder(t.ln);
    if (!folder) {
      $('files-tree').innerHTML = `<div class="m3 text-center py-8">找不到「${esc(t.ln)}」對應的行程資料夾<br><button id="jump-all" class="text-blue-400 hover:underline text-xs mt-2">改用「全部瀏覽」手動找 →</button></div>`;
      $('jump-all').onclick = () => { filesMode = 'all'; renderFiles(); };
    } else {
      const bestIds = bestMatchIds(folder, t);
      $('files-tree').innerHTML =
        `<div class="m3 text-xs mb-2">已展開「${esc(t.ln)}」的行程${bestIds.size ? '，⭐ 是系統判斷跟這團最相符的' : ''}</div>` +
        node(folder, 0, true, bestIds);
    }
  } else {
    // 全部瀏覽：完整樹狀
    $('files-tree').innerHTML = (FILETREE.children || []).map(c => node(c, 0, false, null)).join('') || '<div class="m3">沒有符合的檔案</div>';
  }

  $('files-tree').querySelectorAll('.file-pick').forEach(btn => btn.onclick = () => {
    const f = { id: btn.dataset.id, n: btn.dataset.n };
    if (FILEPICK_GK) CHOSENFILES[FILEPICK_GK] = f;   // 某一組單獨改
    else SHAREDFILE = f;                              // 共同行程（套用全部）
    showDetail();
    $('files-modal').classList.add('hidden');
    toast('已選取：' + btn.dataset.n);
  });

  // 相關行程模式：自動捲到星號那個檔案（檔案多時不用一直往下滑）
  if (related) requestAnimationFrame(() => {
    const hl = $('files-tree').querySelector('[data-hl]');
    if (hl) hl.scrollIntoView({ block: 'center' });
  });
}

// 共同行程按鈕（套用全部選取）＋底部的已選檔名列
$('files-btn').onclick = () => { if (!selRows().length) return; FILEPICK_GK = null; openFiles(); };
$('shared-file-clear').onclick = () => { SHAREDFILE = null; updateSharedFile(); showDetail(); };
// 點檔名＝在新分頁開 Google Drive 預覽這份行程表
$('shared-file-name').onclick = () => { if (SHAREDFILE) window.open(`https://drive.google.com/file/d/${SHAREDFILE.id}/view`, '_blank', 'noopener'); };
function updateSharedFile() {
  $('shared-file').classList.toggle('hidden', !SHAREDFILE);
  if (SHAREDFILE) $('shared-file-name').textContent = '共同行程：' + SHAREDFILE.n;
}

// ── 業務設定 ──
const AG_FIELDS = { name: 'ag-name', phone: 'ag-phone', line: 'ag-line', fb: 'ag-fb', lg: 'ag-lg', lgpw: 'ag-lgpw' };
$('agent-btn').onclick = () => {
  for (const [k, id] of Object.entries(AG_FIELDS)) $(id).value = AGENT[k] || '';
  $('agent-modal').classList.remove('hidden');
};
$('agent-close').onclick = () => $('agent-modal').classList.add('hidden');
$('agent-modal').onclick = e => { if (e.target === $('agent-modal')) $('agent-modal').classList.add('hidden'); };
$('agent-save').onclick = async () => {
  const data = {};
  for (const [k, id] of Object.entries(AG_FIELDS)) data[k] = $(id).value.trim();
  // LINE ID：個人帳號沒有 @、官方帳號一定要留著 @（連結格式不同：~個人 vs @官方）。
  //   原本一律砍掉 @ 會讓官方帳號的連結失效（使用者 2026-07-21 回報打了 @ 卻沒上去）
  data.line = data.line.replace(/\s/g, '');
  if (!data.name) return toast('請填業務姓名');
  try {
    await setDoc(doc(db, 'dt_agent', UID), data, { merge: true });
    AGENT = { ...AGENT, ...data };
    $('agent-modal').classList.add('hidden');
    toast('業務設定已儲存');
  } catch (e) { toast('儲存失敗：' + e.message); }
};

// ── 轉換連結（一鍵：直接產生短網址＋複製「報價＋短網址」，不再開第二層視窗）──
$('convert-btn').onclick = async () => {
  const rows = selRows();
  if (!rows.length) return;
  if (!AGENT.name) { toast('請先完成業務設定（至少填姓名）'); $('agent-btn').onclick(); return; }

  // 按「實際用的行程檔案」分桶：同一份行程的團全部放進一條連結（常態＝一條）。
  //   只有某些組單獨換了行程（早班/午班）才會有第二條。（使用者 2026-07-21：同行程別拆多條）
  const byFile = new Map();   // fileId → { file, codes: [] }
  const noFile = [];
  for (const r of rows) {
    const f = effFile(groupKey(r));
    if (!f) { noFile.push(r); continue; }
    if (!byFile.has(f.id)) byFile.set(f.id, { file: f, codes: [] });
    byFile.get(f.id).codes.push(r.c);
  }
  if (noFile.length) {           // 有團還沒有行程 → 先挑共同行程
    toast('請先選擇行程'); FILEPICK_GK = null; openFiles(); return;
  }

  const btn = $('convert-btn'), orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  // ⚠ 產短網址（fetch）＋複製一定要走 copyText：iOS Safari 不准「await 後才複製」，
  //   所以把 fetch 放進 copyText 的 ClipboardItem promise 裡，保住點擊手勢（使用者 2026-07-22 手機回報轉換失敗）
  try {
    await copyText(async () => {
      const idToken = await auth.currentUser.getIdToken();
      const links = {};
      for (const { file, codes } of byFile.values()) {
        let longUrl = `${ITIN_BASE}/?id=${file.id}&n=${encodeURIComponent(AGENT.name)}`;
        if (AGENT.phone) longUrl += `&p=${encodeURIComponent(AGENT.phone)}`;
        if (AGENT.line)  longUrl += `&l=${encodeURIComponent(AGENT.line)}`;
        if (AGENT.fb)    longUrl += `&fb=${encodeURIComponent(AGENT.fb)}`;
        if (AGENT.lg)    longUrl += `&lg=${encodeURIComponent(AGENT.lg)}`;
        if (AGENT.lg && AGENT.lgpw) longUrl += `&lgpw=${encodeURIComponent(AGENT.lgpw)}`;   // 有社群才帶密碼
        longUrl += `&codes=${encodeURIComponent(codes.join(','))}`;   // 這份行程涵蓋的所有團號
        if (!dshow.r) longUrl += `&remain=0`;   // 客人頁餘位顯示跟「剩餘名額」欄一致
        const res = await fetch(`${ITIN_BASE}/api/shorten`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target: longUrl, idToken }),
        });
        if (!res.ok) throw new Error(res.status === 403 ? '沒有轉換連結的權限（請重新登入）' : '產生失敗 ' + res.status);
        const data = await res.json();
        if (!data.shortUrl) throw new Error('產生失敗');
        links[file.id] = data.shortUrl;
      }
      return buildQuoteText(links);
    });
    toast(byFile.size > 1 ? `已轉換 ${byFile.size} 條連結並複製` : '已轉換並複製（報價＋連結）');
  } catch (e) {
    toast('轉換失敗：' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
};

// ── 建立合約：帶團號＋團費開合約系統（findit-contract 會自動解析團號選範本、算費用×人數）──
//   合約系統有自己的登入門禁（跟舊外掛同一批白名單帳號），這裡只負責把資料帶過去。
$('contract-btn').onclick = () => {
  const rows = selRows();
  if (rows.length !== 1) return;            // 一團一份（按鈕已反灰，這裡再擋一層）
  const r = rows[0];
  const { price } = priceOfRow(r);          // 團費跟著業務當下選的團型走
  const url = `${CONTRACT_BASE}/?tour=${encodeURIComponent(r.c)}&price=${encodeURIComponent(price)}`;
  window.open(url, '_blank', 'noopener');
  toast('已開啟合約系統，帶入團號＋團費');
};

// ── 篩選事件 ──
$('f-line').onchange = loadFile;
$('f-region').onchange = render;   // 日期改用 flatpickr，變動在它的 onChange 觸發
$('f-search').oninput = render;

// 快速篩選（促銷／有位）：開關型，狀態記住，下次打開還在
['f-promo', 'f-avail'].forEach(id => {
  if (localStorage.getItem('d1dt_' + id) === '1') $(id).classList.add('on');
  $(id).onclick = () => {
    const on = $(id).classList.toggle('on');
    localStorage.setItem('d1dt_' + id, on ? '1' : '0');
    render();
  };
});

// ESC 關掉最上層的浮動視窗（使用者 2026-07-20）：選擇行程 → 業務設定 → 選取資料卡
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!$('files-modal').classList.contains('hidden')) $('files-modal').classList.add('hidden');
  else if (!$('agent-modal').classList.contains('hidden')) $('agent-modal').classList.add('hidden');
  else if (!$('detail-card').classList.contains('hidden')) $('detail-close').onclick();
});
</script>
</body>
