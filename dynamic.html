<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D1 動態查詢</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ── 深／淺色主題（顏色都走變數，切換只換這一組值）────────── */
  :root {
    --bg:#0b0f17; --surface:#131a28; --surface2:#0e1a2e;
    --bd:#263148; --bd2:#1a2336;
    --fg:#e2e8f0; --m1:#cbd5e1; --m2:#94a3b8; --m3:#64748b; --m4:#475569;
    --raw-bg:#000; --raw-fg:#cfd6e4;
    --sec-bg:#0e1626; --sec-fg:#fff;
    --hover:#122544; --sel-bg:#7a5c00; --sel-fg:#fff;
    --code-fg:#8ec2ff; --code-bg:#0d2c5e; --sel-code-bg:#a37b00;
    --promo:#ff8ab5; --price:#fcd34d;
  }
  [data-theme="light"] {
    --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc;
    --bd:#cbd5e1; --bd2:#e2e8f0;
    --fg:#0f172a; --m1:#334155; --m2:#475569; --m3:#64748b; --m4:#94a3b8;
    --raw-bg:#fff; --raw-fg:#1e293b;
    --sec-bg:#e2e8f0; --sec-fg:#0f172a;
    --hover:#dbeafe; --sel-bg:#fde68a; --sel-fg:#111;
    --code-fg:#1d4ed8; --code-bg:#dbeafe; --sel-code-bg:#f59e0b;
    --promo:#db2777; --price:#b45309;
  }
  body { font-family:'Noto Sans TC', sans-serif; background:var(--bg); color:var(--fg); }

  /* 主題感知的工具 class（取代寫死的色碼） */
  .surface { background:var(--surface); } .surface2 { background:var(--surface2); }
  .app-bg  { background:var(--bg); }
  .bd { border-color:var(--bd); } .bd2 { border-color:var(--bd2); }
  .m1 { color:var(--m1); } .m2 { color:var(--m2); } .m3 { color:var(--m3); } .m4 { color:var(--m4); }
  .price { color:var(--price); }

  .input-style { background:var(--surface); border:1px solid var(--bd); border-radius:.7rem; padding:.5rem .75rem; color:var(--fg); font-size:.9rem; }
  .input-style:focus { border-color:#3b82f6; outline:none; }
  ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-thumb { background:var(--bd); border-radius:5px; }
  .chip { font-size:.7rem; padding:.1rem .45rem; border-radius:.5rem; font-weight:700; white-space:nowrap; }
  #toast { position:fixed; left:50%; bottom:2rem; transform:translateX(-50%) translateY(20px); opacity:0; transition:.25s; z-index:90; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── 漢書原始排版區 ─────────────────────────── */
  #raw-view {
    font-family: 'Consolas', '細明體', 'MingLiU', 'Courier New', monospace;
    font-size: var(--raw-size, 15px); line-height: 1.5;
    background:var(--raw-bg); color:var(--raw-fg);
    white-space: pre; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .hl { padding: 0 .5rem; }
  .hl-sec  { color:var(--sec-fg); font-weight:700; background:var(--sec-bg); }
  .hl-tour { cursor:pointer; }
  .hl-tour:hover { background:var(--hover); }
  .hl-tour.sel { background:var(--sel-bg); color:var(--sel-fg); }       /* 選取行：金黃（仿舊系統）*/
  .hl-tour .code { color:var(--code-fg); background:var(--code-bg); border-radius:.2rem; }
  .hl-tour.sel .code { color:var(--sel-fg); background:var(--sel-code-bg); }
  .hl-tour .promo { color:var(--promo); }

  /* ── 手機（≤640px）：卡片變成底部抽屜、字級縮小、按鈕加大好點 ── */
  @media (max-width: 640px) {
    :root { --raw-size: 12px; }
    #detail-card {
      left:0 !important; right:0 !important; bottom:0 !important; top:auto !important;
      width:100% !important; max-width:100% !important;
      border-radius:1rem 1rem 0 0; max-height:72vh; display:flex; flex-direction:column;
    }
    #detail-head { cursor:default; }        /* 手機不拖曳，固定在下方 */
    #detail-head .fa-grip-vertical { display:none; }
    #detail-body { flex:1; max-height:none !important; }
    .hl { padding:.15rem .5rem; }           /* 行距拉開，手指好點 */
    .mobile-hide { display:none !important; }
  }
</style>
</head>
<body>

<!-- ══ 登入頁 ══ -->
<div id="login-page" class="hidden min-h-screen items-center justify-center p-6">
  <div class="w-full max-w-sm surface border bd rounded-3xl p-8 shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3"><i class="fa-solid fa-bolt text-blue-500"></i></div>
      <h1 class="text-2xl font-black tracking-wide">D1 動態查詢</h1>
      <p class="text-xs m2 mt-2">帳號密碼與 D1 公佈欄相同</p>
    </div>
    <div class="space-y-4">
      <input id="login-acc" class="w-full input-style" placeholder="員編" autocomplete="username">
      <input id="login-pwd" type="password" class="w-full input-style" placeholder="密碼" autocomplete="current-password">
      <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-2xl transition active:scale-95">登入</button>
      <p id="login-msg" class="text-xs text-red-400 font-bold min-h-[1rem] whitespace-pre-wrap"></p>
    </div>
  </div>
</div>

<!-- ══ 主畫面 ══ -->
<div id="main-page" class="hidden h-screen flex flex-col">
  <header class="app-bg border-b bd2 px-4 py-3 shrink-0">
    <div class="flex flex-wrap items-center gap-3">
      <h1 class="text-lg font-black whitespace-nowrap"><i class="fa-solid fa-bolt text-blue-500 mr-1"></i>D1 動態查詢</h1>
      <span id="stamp-badge" class="chip surface2 m1"><i class="fa-regular fa-clock mr-1"></i>載入中…</span>
      <div class="flex-1"></div>
      <span id="user-name" class="text-sm m1 mobile-hide"></span>
      <button id="theme-btn" class="text-xs m2 hover:text-blue-400 border bd rounded-lg px-3 py-1.5 transition" title="深色／淺色切換"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
      <button id="agent-btn" class="text-xs m2 hover:price border bd rounded-lg px-3 py-1.5 transition"><i class="fa-solid fa-id-card mr-1"></i><span class="mobile-hide">業務設定</span></button>
      <a href="./" class="text-xs m2 hover:text-blue-400 border bd rounded-lg px-3 py-1.5 transition"><i class="fa-solid fa-house mr-1"></i><span class="mobile-hide">回公佈欄</span></a>
      <button id="logout-btn" class="text-xs m2 hover:text-red-400 border bd rounded-lg px-3 py-1.5 transition">登出</button>
    </div>
    <div class="flex flex-wrap items-center gap-2 mt-3 text-sm">
      <span class="m3 font-bold mobile-hide">動態：</span>
      <select id="f-line" class="input-style font-bold min-w-[220px] max-w-full flex-1 sm:flex-none"></select>
      <span class="m3 font-bold ml-2 mobile-hide">地區：</span>
      <select id="f-region" class="input-style min-w-[140px] max-w-full flex-1 sm:flex-none"><option value="">全部地區</option></select>
      <button id="more-btn" class="input-style sm:hidden"><i class="fa-solid fa-sliders"></i></button>
      <div id="more-filters" class="flex flex-wrap items-center gap-2 max-sm:hidden max-sm:w-full">
        <span class="m3 font-bold mobile-hide">日期：</span>
        <input id="f-from" type="date" class="input-style">
        <span class="m4">→</span>
        <input id="f-to" type="date" class="input-style">
        <input id="f-search" class="input-style w-44 max-sm:w-full ml-2 max-sm:ml-0" placeholder="🔍 搜尋（團號/任意字）">
      </div>
    </div>
  </header>

  <main id="raw-view" class="flex-1 py-2"></main>
</div>

<!-- ══ 明細卡（選取資料）══ -->
<div id="detail-card" class="hidden fixed right-3 bottom-3 w-[214px] max-w-[calc(100vw-1.5rem)] max-h-[calc(100vh-1.5rem)] flex-col surface border bd rounded-2xl shadow-2xl z-50 overflow-hidden">
  <div id="detail-head" class="flex items-center justify-between px-2 py-2 border-b bd2 relative cursor-move select-none" title="拖曳可移動位置">
    <span class="font-bold text-xs truncate"><i class="fa-solid fa-grip-vertical m4 mr-1"></i>選取<span id="detail-count" class="m3 font-normal"></span></span>
    <div class="flex items-center gap-0.5 shrink-0">
      <button id="dcol-btn" class="text-xs m2 hover:text-blue-400 w-6 h-6" title="顯示欄位"><i class="fa-solid fa-gear"></i></button>
      <button id="detail-close" class="m2 hover:text-red-400 w-6 h-6"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="dcol-menu" class="hidden absolute right-2 top-10 surface border bd rounded-xl p-3 shadow-2xl z-[70] w-36"></div>
  </div>
  <div id="detail-body" class="px-2 py-2 text-xs overflow-y-auto flex-1 min-h-0"></div>
  <div id="chosen-file" class="hidden mx-3 mb-1 px-3 py-2 surface2 border bd rounded-xl text-xs flex items-center gap-2">
    <i class="fa-regular fa-file-pdf text-red-400"></i>
    <span id="chosen-file-name" class="flex-1 truncate m1"></span>
    <button id="chosen-file-clear" class="m3 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="grid grid-cols-2 gap-1 p-2 border-t bd2">
    <button id="files-btn" class="bg-blue-700 hover:bg-blue-600 text-white font-bold py-1.5 rounded-lg text-[.7rem] transition"><i class="fa-regular fa-folder-open mr-0.5"></i>行程</button>
    <button id="copy-btn" class="surface2 hover:opacity-80 m1 border bd font-bold py-1.5 rounded-lg text-[.7rem] transition"><i class="fa-regular fa-copy mr-0.5"></i>複製</button>
    <button class="bg-emerald-900/40 text-emerald-600 font-bold py-1.5 rounded-lg text-[.7rem] cursor-not-allowed" title="下一階段接上合約系統"><i class="fa-solid fa-file-signature mr-0.5"></i>合約</button>
    <button id="convert-btn" class="bg-indigo-700 hover:bg-indigo-600 text-white font-bold py-1.5 rounded-lg text-[.7rem] transition"><i class="fa-solid fa-plane mr-0.5"></i>轉換</button>
  </div>
</div>

<!-- ══ 業務設定 modal ══ -->
<div id="agent-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="surface border bd rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b bd2">
      <span class="font-bold"><i class="fa-solid fa-id-card price mr-2"></i>業務設定（轉換連結名片）</span>
      <button id="agent-close" class="m2 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="p-5 space-y-3 text-sm max-h-[65vh] overflow-y-auto">
      <div><label class="text-xs m3 font-bold">業務姓名 *</label><input id="ag-name" class="w-full input-style mt-1" placeholder="旅遊大仁哥"></div>
      <div><label class="text-xs m3 font-bold">聯絡電話</label><input id="ag-phone" class="w-full input-style mt-1" placeholder="0277463632"></div>
      <div><label class="text-xs m3 font-bold">LINE ID</label><input id="ag-line" class="w-full input-style mt-1" placeholder="不含 @ 符號"></div>
      <div><label class="text-xs m3 font-bold">FB 粉專／社團連結</label><input id="ag-fb" class="w-full input-style mt-1" placeholder="https://www.facebook.com/…（選填）"></div>
      <div><label class="text-xs m3 font-bold">LINE 社群連結</label><input id="ag-lg" class="w-full input-style mt-1" placeholder="https://line.me/ti/g2/…（選填）"></div>
      <div><label class="text-xs m3 font-bold">授權信箱 *</label><input id="ag-email" class="w-full input-style mt-1" placeholder="跟原本外掛用的同一個信箱">
        <p class="text-[.65rem] m4 mt-1">縮網址授權用。填你在「行程連結轉換器」外掛裡用的那個信箱。</p></div>
      <button id="agent-save" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-2.5 rounded-xl transition">儲存</button>
    </div>
  </div>
</div>

<!-- ══ 轉換連結 modal ══ -->
<div id="convert-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="surface border bd rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b bd2">
      <span class="font-bold"><i class="fa-solid fa-plane text-indigo-400 mr-2"></i>轉換連結</span>
      <button id="convert-close" class="m2 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="p-5 space-y-3 text-sm">
      <div class="flex justify-between"><span class="m3">團號</span><span id="cv-code" class="font-mono font-bold text-blue-300"></span></div>
      <div>
        <label class="text-xs m3 font-bold">行程</label>
        <div id="cv-file-row" class="mt-1"></div>
        <input id="cv-file-paste" class="w-full input-style mt-1.5" placeholder="或直接貼上行程 PDF 的雲端連結（drive.google.com/file/d/…）">
      </div>
      <label class="flex items-center gap-2 cursor-pointer select-none m1">
        <input id="cv-remain" type="checkbox" class="accent-indigo-500" checked>顯示剩餘名額（客人頁面）
      </label>
      <button id="cv-go" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl transition"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>產生連結</button>
      <div id="cv-result" class="hidden surface2 border border-indigo-900 rounded-xl p-3">
        <div class="flex items-center gap-2">
          <input id="cv-short" readonly class="flex-1 input-style font-mono text-indigo-300">
          <button id="cv-copy" class="bg-indigo-700 hover:bg-indigo-600 text-white rounded-lg px-3 py-2"><i class="fa-regular fa-copy"></i></button>
        </div>
        <a id="cv-preview" target="_blank" rel="noopener" class="inline-block text-xs m2 hover:text-indigo-300 mt-2"><i class="fa-solid fa-eye mr-1"></i>預覽客人看到的頁面</a>
      </div>
      <p id="cv-msg" class="text-xs text-red-400 min-h-[1rem]"></p>
    </div>
  </div>
</div>

<!-- ══ 行程檔案選擇 modal ══ -->
<div id="files-modal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4">
  <div class="surface border bd rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b bd2">
      <span class="font-bold">請選擇行程</span>
      <button id="files-close" class="m2 hover:text-white w-7 h-7"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="px-5 py-3 border-b bd2 flex gap-2">
      <input id="files-search" class="input-style flex-1" placeholder="請輸入關鍵字搜尋…">
      <button id="files-expand" class="input-style text-xs">全部展開</button>
      <button id="files-collapse" class="input-style text-xs">全部收合</button>
    </div>
    <div id="files-tree" class="flex-1 overflow-y-auto p-4 text-sm"></div>
  </div>
</div>

<div id="toast" class="bg-blue-600 text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-xl"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeUModpZrGLQifjDXhIOfIAYdK538wgik",
  authDomain: "ddd1-v3.firebaseapp.com",
  projectId: "ddd1-v3",
  storageBucket: "ddd1-v3.appspot.com",
  messagingSenderId: "932033353369",
  appId: "1:932033353369:web:4a9d11493257fa6e924a08",
};
const LEGACY_DOMAIN = "@d-group.app";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── 全域狀態 ──
let META = null;
let RAWCACHE = {};            // 檔號 → { name, lines:[...] }
let ROWCACHE = {};            // 檔號 → rows
let LINES = [];               // 目前檔案的行（含 row 對應）
let SELLINES = [];            // 選取的行 index（可多筆，照舊系統：Shift 框選、Ctrl 加選）
let ANCHOR = -1;              // Shift 框選的起點
let FILETREE = null;          // 行程檔案樹
let UID = null;               // 登入者 uid
let AGENT = {};               // 業務設定（dt_agent/{uid}）
let CHOSENFILE = null;        // 選取的行程檔案 { id, n }
let VISIBLE = [];             // 目前畫面上看得到的團行 index（Shift 框選用）
const ITIN_BASE = 'https://discoveredtrip.com';   // 中轉頁

const $ = id => document.getElementById(id);

// ── 深／淺色主題（記住選擇；沒設過就跟著手機/電腦的系統設定）──
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  $('theme-icon').className = t === 'light' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  localStorage.setItem('d1dt_theme', t);
}
applyTheme(localStorage.getItem('d1dt_theme')
  || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
$('theme-btn').onclick = () =>
  applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
// 手機：日期／搜尋收在「⚙」裡，需要才展開
$('more-btn').onclick = () => $('more-filters').classList.toggle('max-sm:hidden');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$ = n => n == null ? '--' : n.toLocaleString();
const WD = ['日','一','二','三','四','五','六'];
const fmtDt = iso => {
  if (!iso) return '--';
  const [y, m, d] = iso.split('-').map(Number);
  return `${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}(${WD[new Date(y, m-1, d).getDay()]})`;
};
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
function showPage(id) { ['login-page','main-page'].forEach(p => { $(p).classList.toggle('hidden', p !== id); if (p === id) $(p).classList.add('flex'); else $(p).classList.remove('flex'); }); }

// ── 登入（與公佈欄同一套帳號）──
$('login-btn').onclick = doLogin;
$('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function doLogin() {
  let e = $('login-acc').value.trim(), p = $('login-pwd').value;
  if (!e || !p) return $('login-msg').innerText = '請輸入員編和密碼';
  if (!e.includes('@')) e += LEGACY_DOMAIN;
  $('login-msg').innerText = '';
  signInWithEmailAndPassword(auth, e, p).catch(err => {
    $('login-msg').innerText = /invalid-credential|wrong-password|user-not-found/.test(err.code)
      ? '員編或密碼錯誤' : '登入失敗：' + err.code;
  });
}
$('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) return showPage('login-page');
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { $('login-msg').innerText = '權限錯誤：找不到使用者紀錄'; return signOut(auth); }
    UID = user.uid;
    $('user-name').textContent = snap.data().nickname || snap.data().account || '';
    showPage('main-page');
    // 業務設定（轉換連結名片）
    try { const ag = await getDoc(doc(db, 'dt_agent', UID)); AGENT = ag.exists() ? ag.data() : {}; } catch { AGENT = {}; }
    await boot();
  } catch (err) {
    $('login-msg').innerText = '讀取失敗：' + err.message; signOut(auth);
  }
});

// ── 啟動 ──
async function boot() {
  const m = await getDoc(doc(db, 'dt_tours', '_meta'));
  if (!m.exists()) { $('stamp-badge').innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i>還沒有資料'; return; }
  META = m.data();

  const ageMin = (Date.now() - new Date(META.stamp.replace(' ', 'T'))) / 60000;
  const stale = ageMin > 150;
  $('stamp-badge').className = 'chip ' + (stale ? 'bg-red-900/60 text-red-300' : 'surface2 m1');
  $('stamp-badge').innerHTML = `<i class="fa-regular fa-clock mr-1"></i>資料時間 ${esc(META.stamp.slice(5))}（每小時更新${stale ? '｜⚠ 已超過 ' + Math.round(ageMin/60) + ' 小時' : ''}）`;

  // 動態選單：顯示漢書原始檔名（跟舊系統一樣）
  const files = [...META.files].sort((a, b) => a.f.localeCompare(b.f));
  $('f-line').innerHTML = files.map(f =>
    `<option value="${esc(f.f)}">${esc((f.name || f.line).replace(/\.txt$/i, '').replace(/\s+/g, ' '))}</option>`).join('');
  const saved = localStorage.getItem('d1dt_line');
  if (saved && files.some(f => f.f === saved)) $('f-line').value = saved;

  const t = new Date(), p2 = n => String(n).padStart(2, '0');
  $('f-from').value = `${t.getFullYear()}-${p2(t.getMonth()+1)}-${p2(t.getDate())}`;
  const e = new Date(t); e.setFullYear(e.getFullYear() + 1);
  $('f-to').value = `${e.getFullYear()}-${p2(e.getMonth()+1)}-${p2(e.getDate())}`;

  await loadFile();
}

// ── 載入一個漢書檔（原文＋解析資料）──
async function loadFile() {
  const fno = $('f-line').value;
  localStorage.setItem('d1dt_line', fno);
  $('raw-view').innerHTML = '<div class="m3 p-6"><i class="fa-solid fa-spinner fa-spin mr-2"></i>載入中…</div>';

  if (!RAWCACHE[fno]) {
    const [rawSnap, rowSnap] = await Promise.all([
      getDoc(doc(db, 'dt_raw', fno)),
      getDoc(doc(db, 'dt_tours', fno)),
    ]);
    RAWCACHE[fno] = rawSnap.exists() ? rawSnap.data() : { text: '' };
    ROWCACHE[fno] = rowSnap.exists() ? JSON.parse(rowSnap.data().rows) : [];
  }

  // 行 → 團 的對應（用原始行文字比對；漢書同團重複列出的行會對到同一團，正常）
  const rowByRaw = new Map();
  for (const r of ROWCACHE[fno]) if (r.rw) rowByRaw.set(r.rw, r);

  const secRe = /^[\s"]*■/;
  const headerRe = /備註/;
  LINES = RAWCACHE[fno].text.split('\n').map((t0, i) => {
    const text = t0.replace(/\r$/, '').trimEnd();
    const row = rowByRaw.get(text) || null;
    const isSec = secRe.test(text) && !headerRe.test(text) && !/★/.test(text);
    return { i, text, row, isSec };
  });

  // 地區選單：分區標題行
  const secs = LINES.filter(l => l.isSec && l.text.replace(/[■▆▂▄*＊\s　"]/g, ''));
  $('f-region').innerHTML = '<option value="">全部地區</option>' + secs.map(l =>
    `<option value="${l.i}">${esc(l.text.replace(/[■▆▂▄*＊\s　"]/g, ''))}</option>`).join('');

  SELLINES = []; ANCHOR = -1;
  hideCard();
  render();
}

// ── 呈現（保留漢書原樣，只做過濾和上色）──
function render() {
  const from = $('f-from').value, to = $('f-to').value;
  const q = $('f-search').value.trim().toUpperCase();
  const regionStart = $('f-region').value === '' ? -1 : +$('f-region').value;

  // 地區範圍：選定分區 → 只顯示該分區到下一個分區之間
  let regionEnd = Infinity;
  if (regionStart >= 0) {
    const next = LINES.find(l => l.isSec && l.i > regionStart);
    regionEnd = next ? next.i : Infinity;
  }

  const out = [];
  for (const l of LINES) {
    if (regionStart >= 0 && (l.i < regionStart || l.i >= regionEnd)) continue;
    if (l.row) {
      if (from && l.row.dt && l.row.dt < from) continue;
      if (to && l.row.dt && l.row.dt > to) continue;
      if (q && !l.text.toUpperCase().includes(q)) continue;
      let h = esc(l.text);
      // 團號上色（跟舊系統一樣把團號標成藍色塊）
      // 只標團號裡的日期四碼（跟舊系統一樣），不是整串團號
      h = h.replace(/([A-Z]{2,3}\d[A-Z0-9]{2}|[=＝]{4,})(\d{4})(?=[A-Z]\d)/, (m, pre, dt) => `${pre}<span class="code">${dt}</span>`);
      h = h.replace(/(&quot;促銷&quot;)/g, '<span class="promo">$1</span>');
      out.push(`<div class="hl hl-tour ${SELLINES.includes(l.i) ? 'sel' : ''}" data-i="${l.i}">${h}</div>`);
    } else if (l.isSec) {
      if (q) continue;
      out.push(`<div class="hl hl-sec">${esc(l.text)}</div>`);
    } else {
      if (q) continue;
      out.push(`<div class="hl m2">${esc(l.text) || ' '}</div>`);
    }
  }
  $('raw-view').innerHTML = out.join('') || '<div class="m3 p-6">沒有符合條件的資料</div>';
  VISIBLE = [...$('raw-view').querySelectorAll('.hl-tour')].map(el => +el.dataset.i);
  $('raw-view').querySelectorAll('.hl-tour').forEach(el => el.onclick = e => selectLine(+el.dataset.i, e));
}

// ── 選取（照舊系統）──
//    點一團＝加進來（再點一次取消）；Shift＋點＝從上一個選到這裡整段框起來。
//    這樣連點好幾團就會一直累加，不用按著 Ctrl。
function selectLine(i, e) {
  const l = LINES[i];
  if (!l || !l.row) return;
  if (e && e.shiftKey && ANCHOR >= 0) {
    const a = VISIBLE.indexOf(ANCHOR), b = VISIBLE.indexOf(i);
    if (a >= 0 && b >= 0) {
      const [lo, hi] = a <= b ? [a, b] : [b, a];
      SELLINES = VISIBLE.slice(lo, hi + 1);          // 只框「目前看得到」的行，不會把被篩掉的偷偷選進去
    }
  } else {
    SELLINES = SELLINES.includes(i) ? SELLINES.filter(x => x !== i) : [...SELLINES, i];
    ANCHOR = i;
  }
  document.getSelection()?.removeAllRanges();        // Shift 點擊會反白整片文字，清掉
  render();
  showDetail();
}
const selRows = () => SELLINES.map(i => LINES[i]?.row).filter(Boolean);

// ── 明細卡欄位設定（照舊系統：預設只顯示團費/航空/出發日/天數，其他用「顯示欄位」勾）──
const DFIELDS = [

  { k: 'dt',  name: '出發日',   def: 1 },
  { k: 'dy',  name: '天數',     def: 1 },
  { k: 'p',   name: '產品',     def: 0 },
  { k: 'cap', name: '機位',     def: 0 },
  { k: 's',   name: '報名',     def: 0 },
  { k: 'r',   name: '剩餘名額', def: 0 },
  { k: 'ld',  name: '領隊',     def: 0 },
  { k: 'dl',  name: 'ＤＬ',     def: 0 },
  { k: 'tp',  name: '票款',     def: 0 },
  { k: 'ti',  name: '開票',     def: 0 },
  { k: 'tk',  name: '票+稅',    def: 0 },
  { k: 'bs',  name: '報名明細', def: 0 },
];
let dshow = JSON.parse(localStorage.getItem('d1dt_dfields') || 'null')
  || Object.fromEntries(DFIELDS.map(f => [f.k, !!f.def]));

function buildDMenu() {

// ── 明細區塊 ──
//    同價位、同航空、同天數、同產品的團合併成一塊，只在「出發日」那排多列幾個日期
//    （使用者 2026-07-18：同價位商品只是日期不同，顯示在同一個就好）
const groupKey = r => [r.pr, r.an, r.dy, r.p, r.gw, r.dp].join('|');
// 每團可能不一樣的欄位：合併顯示時要跟著日期一筆一筆列，不能只印一個
const PERTOUR = [
  { k: 'cap', name: '機位',  get: r => `${r.cap ?? '--'}${r.ok ? '' : ' ⚠'}` },
  { k: 's',   name: '報名',  get: r => `${r.s} 人${r.w ? '（候補 ' + r.w + '）' : ''}` },
  { k: 'r',   name: '剩餘',  get: r => `<span class="${r.r === 0 ? 'text-red-400' : r.r <= 5 ? 'price' : 'text-emerald-400'}">${r.r === 0 ? '滿' : r.r}</span>` },
  { k: 'ld',  name: '領隊',  get: r => r.ld ? esc(r.ld) : '未派' },
  { k: 'dl',  name: 'ＤＬ',  get: r => r.dl ? esc(r.dl) : '--' },
  { k: 'tp',  name: '票款',  get: r => r.tp ? esc(r.tp) : '--' },
  { k: 'ti',  name: '開票',  get: r => r.ti ? esc(r.ti) : '--' },
  { k: 'tk',  name: '票+稅', get: r => r.tf != null ? `${fmt$(r.tf)}+${fmt$(r.tx)}` : '--' },
];

function groupBlock(g) {
  const r0 = g[0];
  const line = (k, v) => `<div class="flex justify-between py-1.5 border-b bd2 gap-3"><span class="m3 shrink-0">${k}</span><span class="font-bold text-right">${v}</span></div>`;
  const parts = [];
  if (g.some(r => r.pm)) parts.push(`<div class="mb-1.5"><span class="chip bg-pink-900/60 text-pink-300">促銷</span></div>`);
  parts.push(line('團費', `<span class="price text-lg">${fmt$(r0.pr)}</span>`));
  if (dshow.an) parts.push(line('航空公司', esc(r0.an)));
  if (dshow.dt) parts.push(line('出發日', `<span class="inline-flex flex-wrap gap-1 justify-end">${g.map(r => `<span class="chip bg-[#1a2c50] text-slate-200" title="${esc(r.c)}">${fmtDt(r.dt)}</span>`).join('')}</span>`));
  if (dshow.dy) parts.push(line('天數', `${r0.dy}天`));
  if (dshow.p)  parts.push(line('產品', `${esc(r0.p)}${r0.gw !== '直飛' ? '｜' + esc(r0.gw) : ''}${r0.dp !== '台北' ? '｜' + esc(r0.dp) + '出發' : ''}`));

  const cols = PERTOUR.filter(f => dshow[f.k]);
  if (cols.length) {
    if (g.length === 1) {
      cols.forEach(f => parts.push(line(f.name === '剩餘' ? '剩餘名額' : f.name, f.get(r0))));
    } else {
      // 多團合併：日期一列，後面接各自的機位/餘位…
      parts.push(
        `<div class="pt-2 overflow-x-auto"><table class="w-full text-xs">
          <thead><tr class="m3"><th class="text-left font-bold pb-1">出發日</th>${cols.map(f => `<th class="text-right font-bold pb-1 pl-3">${f.name}</th>`).join('')}</tr></thead>
          <tbody>${g.map(r => `<tr class="border-t bd2"><td class="py-1">${fmtDt(r.dt)}</td>${cols.map(f => `<td class="text-right pl-3">${f.get(r)}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>`);
    }
  }
  if (dshow.bs) {
    const bsAll = g.map(r => {
      const bs = (r.bs || []).map(([n, x, paid]) => `<span class="chip ${paid ? 'bg-emerald-900/50 text-emerald-300' : 'bg-slate-800 m2'}" title="${paid ? '已收訂' : '卡位未收款'}">${esc(n)}${x}</span>`).join(' ');
      return bs ? `<div class="mt-1.5"><span class="m4 text-[.65rem]">${fmtDt(r.dt)}</span> ${bs}</div>` : '';
    }).join('');
    if (bsAll) parts.push(`<div class="pt-2"><span class="m3 text-xs">報名明細</span>${bsAll}</div>`);
  }
  return parts.join('');
}

function showDetail() {
  const rows = selRows();
  if (!rows.length) { hideCard(); return; }
  // 依「價格+航空+天數+產品」分組，同組只出一塊、日期併排
  const groups = [];
  const idx = new Map();
  for (const r of rows) {
    const k = groupKey(r);
    if (!idx.has(k)) { idx.set(k, groups.length); groups.push([]); }
    groups[idx.get(k)].push(r);
  }
  groups.forEach(g => g.sort((a, b) => (a.dt || '').localeCompare(b.dt || '')));
  $('detail-count').textContent = `（共 ${rows.length} 筆${groups.length < rows.length ? '／' + groups.length + ' 種' : ''}）`;
  $('detail-body').innerHTML =
    groups.map(g => `<div class="mb-3 pb-1">${groupBlock(g)}</div>`).join('<div class="border-t-2 bd mb-3"></div>');
  showCard();
}
$('detail-close').onclick = () => { hideCard(); SELLINES = []; ANCHOR = -1; $('dcol-menu').classList.add('hidden'); render(); };

// ── 明細卡：顯示／隱藏（顯示要用 flex，且顯示後重新校正位置把整張卡拉回畫面內，
//    確保底部按鈕不會掉出畫面被切掉）──
const _card = $('detail-card'), _head = $('detail-head');
const isMobile = () => matchMedia('(max-width: 640px)').matches;
// 把卡片限制在畫面內：先量真實高度（要先 flex 顯示才量得到），再夾住座標
function clampCard(x, y) {
  const w = _card.offsetWidth || 214, h = _card.offsetHeight || 200;
  x = Math.max(4, Math.min(x, innerWidth - w - 4));
  y = Math.max(4, Math.min(y, innerHeight - h - 4));
  _card.style.left = x + 'px'; _card.style.top = y + 'px';
  _card.style.right = 'auto'; _card.style.bottom = 'auto';
  return { x, y };
}
function hideCard() { _card.classList.add('hidden'); _card.classList.remove('flex'); }
function showCard() {
  _card.classList.remove('hidden'); _card.classList.add('flex');    // flex 才會撐開 head/body/按鈕三層
  if (isMobile()) { _card.style.left = _card.style.top = ''; return; }  // 手機固定底部抽屜，不套自訂位置
  const saved = JSON.parse(localStorage.getItem('d1dt_cardpos') || 'null');
  // 沒拖過就維持 CSS 的右下角預設（right-3 bottom-3 + max-h，天然不會超出畫面）；
  // 拖過的話等這一幀有真實高度再夾一次，確保底部按鈕不被切掉
  if (saved) requestAnimationFrame(() => clampCard(saved.x, saved.y));
}

// ── 明細卡可拖曳（抓標題列移動，位置記住；視窗縮小時自動拉回畫面內）──
(function makeDraggable() {
  let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
  _head.addEventListener('pointerdown', e => {
    if (isMobile() || e.target.closest('button')) return;   // 手機不拖曳；點按鈕不算拖曳
    const r = _card.getBoundingClientRect();
    dragging = true; sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
    _head.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  _head.addEventListener('pointermove', e => {
    if (!dragging) return;
    const p = clampCard(ox + e.clientX - sx, oy + e.clientY - sy);
    localStorage.setItem('d1dt_cardpos', JSON.stringify(p));
  });
  const stop = e => { if (dragging) { dragging = false; try { _head.releasePointerCapture(e.pointerId); } catch {} } };
  _head.addEventListener('pointerup', stop);
  _head.addEventListener('pointercancel', stop);
  addEventListener('resize', () => {
    if (!_card.classList.contains('hidden') && !isMobile() && _card.style.left)
      clampCard(parseFloat(_card.style.left), parseFloat(_card.style.top));
  });
})();

// ── 行程檔案樹（dt_files 由同步程式維護；還沒開通就顯示說明）──
$('files-btn').onclick = async () => {

      return;
    }
    FILETREE = JSON.parse(snap.data().tree);
  }
  renderTree();

$('files-close').onclick = () => $('files-modal').classList.add('hidden');
$('files-modal').onclick = e => { if (e.target === $('files-modal')) $('files-modal').classList.add('hidden'); };

let expandAll = false;
$('files-expand').onclick = () => { expandAll = true; renderTree(); };
$('files-collapse').onclick = () => { expandAll = false; renderTree(); };
$('files-search').oninput = () => renderTree();

function renderTree() {
  if (!FILETREE) return;
  const q = $('files-search').value.trim().toLowerCase();
  const fmtTime = ms => {
    if (!ms) return '';
    const d = new Date(ms);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const node = (n, depth) => {
    if (n.files !== undefined) {  // 資料夾
      const kids = (n.children || []).map(c => node(c, depth + 1)).join('') +
        (n.files || []).filter(f => !q || f.n.toLowerCase().includes(q)).map(f =>
          `<div class="flex justify-between items-center py-1 pr-2 hover:bg-[#1a2336] rounded" style="padding-left:${depth * 1.25 + 1}rem">
            <button class="file-pick text-blue-400 hover:underline truncate text-left" data-id="${esc(f.id)}" data-n="${esc(f.n)}">${esc(f.n)}</button>
            <span class="shrink-0 ml-3 flex items-center gap-2">
              <span class="m4 text-xs">${fmtTime(f.t)}</span>
              <a href="https://drive.google.com/file/d/${esc(f.id)}/view" target="_blank" rel="noopener" title="預覽" class="m3 hover:text-blue-400"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>
            </span>
          </div>`).join('');
      if (q && !kids) return '';
      const open = expandAll || q || depth === 0;
      return `<details ${open ? 'open' : ''} style="padding-left:${depth ? 1.25 : 0}rem">
        <summary class="cursor-pointer py-1 font-bold m1 hover:text-white select-none">${esc(n.name)}</summary>${kids}</details>`;
    }
    return '';
  };
  $('files-tree').innerHTML = (FILETREE.children || []).map(c => node(c, 0)).join('') || '<div class="m3">沒有符合的檔案</div>';
  // 點檔名＝選取這個行程檔（顯示在明細卡上，轉換連結會用它）
  $('files-tree').querySelectorAll('.file-pick').forEach(btn => btn.onclick = () => {
    CHOSENFILE = { id: btn.dataset.id, n: btn.dataset.n };
    updateChosenFile();
    $('files-modal').classList.add('hidden');
    toast('已選取：' + btn.dataset.n);
    if (!$('convert-modal').classList.contains('hidden')) fillConvert();
  });
}

};

// ── 轉換連結 ──
$('convert-btn').onclick = () => {
  if (!selRows().length) return;
  if (!AGENT.name || !AGENT.email) {
    toast('請先完成業務設定（姓名＋授權信箱）');
    $('agent-btn').onclick();
    return;
  }
  fillConvert();
  $('cv-result').classList.add('hidden');
  $('cv-msg').textContent = '';
  $('convert-modal').classList.remove('hidden');
};
function fillConvert() {
  const rows = selRows();
  $('cv-code').innerHTML = rows.length === 1
    ? esc(rows[0].c)
    : `${rows.length} 團<div class="text-[.65rem] m3 font-sans font-normal mt-1 max-w-[220px] text-right">${rows.map(r => esc(fmtDt(r.dt))).join('、')}</div>`;
  $('cv-file-row').innerHTML = CHOSENFILE
    ? `<div class="flex items-center gap-2 surface2 border bd rounded-xl px-3 py-2"><i class="fa-regular fa-file-pdf text-red-400"></i><span class="flex-1 truncate">${esc(CHOSENFILE.n)}</span></div>`
    : `<button id="cv-pick" class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-2 rounded-xl transition"><i class="fa-regular fa-folder-open mr-1"></i>從公司雲選取</button>`;
  const pick = $('cv-pick');
  if (pick) pick.onclick = () => $('files-btn').onclick();
}
$('convert-close').onclick = () => $('convert-modal').classList.add('hidden');
$('convert-modal').onclick = e => { if (e.target === $('convert-modal')) $('convert-modal').classList.add('hidden'); };

$('cv-go').onclick = async () => {
  const rows = selRows();
  if (!rows.length) return;
  $('cv-msg').textContent = '';
  // 行程檔：優先用選取的，否則從貼上的雲端連結抓 id
  let fileId = CHOSENFILE?.id || null;
  if (!fileId) {
    const m = $('cv-file-paste').value.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) fileId = m[1];
  }
  if (!fileId) { $('cv-msg').textContent = '請選取行程，或貼上雲端 PDF 連結'; return; }

  let longUrl = `${ITIN_BASE}/?id=${fileId}&n=${encodeURIComponent(AGENT.name)}`;
  if (AGENT.phone) longUrl += `&p=${encodeURIComponent(AGENT.phone)}`;
  if (AGENT.line)  longUrl += `&l=${encodeURIComponent(AGENT.line)}`;
  if (AGENT.fb)    longUrl += `&fb=${encodeURIComponent(AGENT.fb)}`;
  if (AGENT.lg)    longUrl += `&lg=${encodeURIComponent(AGENT.lg)}`;
  // 多選＝同一份行程的多個出發梯次，全部帶進 codes，客人頁面就會列出這幾團的班次
  longUrl += `&codes=${encodeURIComponent(rows.map(r => r.c).join(','))}`;
  if (!$('cv-remain').checked) longUrl += `&remain=0`;

  $('cv-go').disabled = true;
  $('cv-go').innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>產生中…';
  try {
    const res = await fetch(`${ITIN_BASE}/api/shorten`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: longUrl, email: AGENT.email }),
    });
    if (!res.ok) throw new Error(res.status === 403 ? '此信箱未授權，請確認業務設定裡的授權信箱' : '產生失敗（' + res.status + '）');
    const data = await res.json();
    if (!data.shortUrl) throw new Error('產生失敗');
    $('cv-short').value = data.shortUrl;
    $('cv-preview').href = data.shortUrl;
    $('cv-result').classList.remove('hidden');
    navigator.clipboard?.writeText(data.shortUrl).then(() => toast('連結已產生並複製'));
  } catch (e) {
    $('cv-msg').textContent = e.message;
  } finally {
    $('cv-go').disabled = false;
    $('cv-go').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-1"></i>產生連結';
  }
};
$('cv-copy').onclick = () => { navigator.clipboard.writeText($('cv-short').value).then(() => toast('已複製')); };

// ── 篩選事件 ──
$('f-line').onchange = loadFile;
['f-region','f-from','f-to'].forEach(id => $(id).onchange = render);
$('f-search').oninput = render;
</script>
</body>
